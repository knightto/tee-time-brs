<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join Masters Pool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/masters/theme.css">
  <script src="/masters/app.js" defer></script>
</head>
<body data-page="join">
  <div class="page">
    <header id="hero" class="hero"></header>
    <div id="pageStatus" class="muted"></div>
    <section id="metrics" class="panel"></section>
    <form id="joinForm" class="stack">
      <section class="panel">
        <div class="card-head">
          <div>
            <div class="section-label">Quick Entry</div>
            <div id="joinHelp" class="muted">Enter the minimum details to submit your picks.</div>
          </div>
        </div>
        <div class="form-grid form-grid-quick">
          <label>Name<input id="entrantName" required placeholder="Your name"></label>
          <label id="poolAccessCodeWrap">Pool Access Code<input id="poolAccessCode" type="password" placeholder="Enter the code from the organizer"></label>
        </div>
        <details class="tier-details optional-details">
          <summary>More Options</summary>
          <div class="form-grid" style="margin-top:12px;">
            <label>Email (optional)<input id="entrantEmail" type="email" placeholder="Only if you want organizer follow-up"></label>
            <label>Tiebreaker Winning Score To Par (optional)<input id="winningScoreGuess" type="number" placeholder="Example: -10"></label>
          </div>
        </details>
      </section>
      <div id="pickBuilder"></div>
      <div class="actions-row">
        <button class="primary" type="submit">Submit Tier Picks</button>
        <a id="rulesLink" class="button-link" href="/masters/rules">Rules</a>
        <a class="button-link" href="/masters">Back to Pools</a>
      </div>
    </form>
  </div>
</body>
</html>
