<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Masters Tier Pool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/masters/theme.css">
  <script src="/masters/app.js" defer></script>
</head>
<body data-page="create">
  <div class="page">
    <header id="hero" class="hero"></header>
    <div id="pageStatus" class="muted"></div>
    <form id="createPoolForm" class="panel stack">
      <div class="section-label">Pool Setup</div>
      <div class="form-grid">
        <label>Admin Code<input id="adminCode" type="password" placeholder="Site admin code"></label>
        <label>Pool Name<input id="poolName" value="Masters Tier Pool"></label>
        <label>Pool Access Code<input id="accessCode" placeholder="Share this code with entrants"></label>
        <label>Season<input id="season" type="number" value="2026"></label>
        <label>Entry Fee<input id="entryFee" type="number" step="0.01" value="10"></label>
        <label>Expected Entrants<input id="expectedEntrants" type="number" value="16"></label>
        <label>Round 1 Starts<input id="round1StartsAt" type="datetime-local"></label>
        <label>Lineup Counting<select id="lineupCountMode"><option value="all" selected>Count all golfers</option><option value="best_x">Count best X golfers</option></select></label>
        <label>Best X<input id="bestX" type="number" min="1" placeholder="Only for best X mode"></label>
      </div>
      <div class="inline-note">Default format requires exactly 1 golfer pick from each tier. Pools stay open until 2 hours after Round 1 starts.</div>
      <div class="grid-3">
        <label>1st Payout<input id="payout1" type="number" value="60"></label>
        <label>1st Mode<select id="payout1Mode"><option value="percentage" selected>Percentage</option><option value="amount">Amount</option></select></label>
        <div></div>
        <label>2nd Payout<input id="payout2" type="number" value="30"></label>
        <label>2nd Mode<select id="payout2Mode"><option value="percentage" selected>Percentage</option><option value="amount">Amount</option></select></label>
        <div></div>
        <label>3rd Payout<input id="payout3" type="number" value="10"></label>
        <label>3rd Mode<select id="payout3Mode"><option value="percentage" selected>Percentage</option><option value="amount">Amount</option></select></label>
      </div>
      <div>
        <div class="section-label">Tier Setup</div>
        <div id="tierTable"></div>
      </div>
      <div>
        <div class="section-label">Official Field</div>
        <div id="seedTable"></div>
      </div>
      <div class="actions-row">
        <button class="primary" type="submit">Create Pool</button>
        <a class="button-link" href="/masters">Back to Pools</a>
      </div>
    </form>
  </div>
</body>
</html>
