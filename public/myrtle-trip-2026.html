<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Myrtle Beach 2026 Golf Trip Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg: #0d1726;
      --panel: #0f2138;
      --panel-soft: #132a45;
      --accent: #e0b457;
      --accent-2: #6dd3ff;
      --ink: #e6edf7;
      --ink-soft: #9fb6d4;
      --muted: #6b82a3;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(109,211,255,0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(224,180,87,0.10), transparent 30%),
                  #0b1422;
      margin: 0;
      color: var(--ink);
      min-height: 100vh;
    }
    .container {
      max-width: 1100px;
      margin: 18px auto 32px;
      padding: 0 16px;
    }
    header.hero {
      background: linear-gradient(135deg, #0f2138 0%, #0b1626 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 4vw, 2rem);
      display: flex;
      align-items: baseline;
      gap: 10px;
      letter-spacing: 0.4px;
    }
    h1 span {
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--ink-soft);
      font-size: 0.85rem;
    }
    .panel {
      background: linear-gradient(145deg, var(--panel) 0%, #0c1a2c 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-top: 16px;
    }
    .summary-card {
      display: grid;
      gap: 12px;
      color: var(--ink);
      line-height: 1.6;
    }
    .summary-card strong { color: #fff; }
    a.cta {
      color: var(--accent-2);
      text-decoration: none;
      font-weight: 600;
    }
    a.cta:hover { text-decoration: underline; }
    .waze-link {
      color: var(--accent-2);
      font-weight: 700;
      text-decoration: none;
    }
    .waze-link:hover { text-decoration: underline; }
    .itinerary-list {
      display: grid;
      gap: 8px;
      margin: 8px 0 0;
      padding: 0;
      list-style: none;
    }
    .itinerary-item {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 4px;
    }
    .itinerary-item small { color: var(--muted); }
    .trip-schedule-layout {
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      gap: 12px;
      margin-top: 10px;
    }
    .trip-calendar-sidebar {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .trip-calendar-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .trip-calendar-month-controls {
      flex: 1;
      display: grid;
      gap: 4px;
      min-width: 0;
      text-align: center;
    }
    .trip-calendar-month {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.2px;
      color: #fff;
    }
    .trip-calendar-nav {
      padding: 6px 10px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--ink);
      box-shadow: none;
      font-size: 1.15rem;
      line-height: 1;
      min-width: 36px;
    }
    .trip-calendar-nav:hover {
      transform: none;
      background: rgba(255,255,255,0.14);
    }
    .trip-calendar-month-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      border: 1px solid rgba(109,211,255,0.45);
      background: rgba(109,211,255,0.12);
      color: #bce8ff;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 700;
      line-height: 1.25;
      padding: 3px 8px;
      border-radius: 999px;
      text-align: center;
    }
    .trip-calendar-month-link:hover {
      background: rgba(109,211,255,0.2);
    }
    .trip-calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .trip-calendar-day-header {
      text-align: center;
      font-size: 0.72rem;
      color: var(--ink-soft);
      font-weight: 700;
      padding: 5px 2px;
    }
    .trip-calendar-day {
      aspect-ratio: 1;
      border-radius: 9px;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: none;
      font-size: 0.86rem;
      font-weight: 700;
      color: #d7e4f5;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .trip-calendar-day:hover {
      transform: none;
      border-color: rgba(109,211,255,0.55);
      background: rgba(109,211,255,0.12);
    }
    .trip-calendar-day.other-month {
      opacity: 0.45;
    }
    .trip-calendar-day.today {
      border-color: rgba(224,180,87,0.85);
      color: #ffe7b8;
    }
    .trip-calendar-day.selected {
      border-color: rgba(109,211,255,0.95);
      background: rgba(109,211,255,0.22);
      color: #ffffff;
    }
    .trip-calendar-day.has-events::after {
      content: '⛳';
      position: absolute;
      bottom: 1px;
      font-size: 0.54rem;
      line-height: 1;
      color: #00b6ff;
      filter: brightness(1.45);
    }
    .trip-events-container {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .trip-events-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .trip-events-title {
      margin: 0;
      color: #fff;
      font-size: 1.05rem;
      letter-spacing: 0.2px;
    }
    .trip-events-meta {
      color: var(--ink-soft);
      font-size: 0.82rem;
    }
    .trip-event-list {
      display: grid;
      gap: 10px;
    }
    .trip-event-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .trip-event-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .trip-event-course {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .trip-event-time {
      color: var(--ink-soft);
      font-size: 0.84rem;
      font-weight: 600;
    }
    .trip-slot-grid {
      display: grid;
      gap: 6px;
    }
    .trip-slot {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 7px 8px;
      background: rgba(11,23,40,0.55);
      display: grid;
      gap: 5px;
    }
    .trip-slot-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 0.81rem;
      color: var(--ink-soft);
      font-weight: 700;
    }
    .trip-slot-players {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .trip-player-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.76rem;
      color: #dce7f7;
      background: rgba(255,255,255,0.08);
      line-height: 1.2;
    }
    .trip-event-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .trip-event-link {
      color: var(--accent-2);
      font-size: 0.8rem;
      font-weight: 700;
      text-decoration: none;
    }
    .trip-event-link:hover {
      text-decoration: underline;
    }
    .trip-empty-state {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 0.9rem;
      background: rgba(255,255,255,0.03);
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .status-pill {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--ink);
      font-size: 0.9rem;
    }
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      margin-top: 12px;
    }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
  }
  #condoGroups.cards-grid {
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
  }
  .condo-group {
    background: var(--panel-soft);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    display: grid;
    gap: 10px;
  }
  .participant-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    display: grid;
    gap: 8px;
    font-size: 0.95rem;
  }
  .participant-card input,
  .participant-card select {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0b1728;
    color: var(--ink);
    font-size: 0.95rem;
  }
  .actions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
  }
  #condoGroups .actions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
  }
  #condoGroups .actions button,
  #condoGroups .actions select {
    padding: 8px 10px;
    font-size: 0.9rem;
  }
  .fields-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
    align-items: center;
  }
  .stacked {
    display: grid;
    gap: 4px;
    color: var(--ink-soft);
    font-size: 0.9rem;
  }
  button {
    background: var(--accent);
    color: #0b1626;
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 30px rgba(224,180,87,0.2);
    }
    button:hover { transform: translateY(-1px); }
    button.secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    #unassignedSidebar {
      background: linear-gradient(180deg, var(--panel) 0%, #0c192c 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }
    #unassignedSidebar ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }
    #unassignedSidebar li {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    #unassignedSidebar select,
    #unassignedSidebar button {
      width: 100%;
    }
    .status-labels {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin: 8px 0;
    }
    .status-labels span {
      color: var(--ink-soft);
      font-size: 0.9rem;
    }
    .map-frame-wrap {
      position: relative;
      width: 100%;
      padding-top: 75%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #0b1728;
    }
    .map-frame-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    /* Mobile-first adjustments */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      header.hero { position: static; }
      .actions { grid-template-columns: 1fr 1fr; }
      .trip-schedule-layout {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 640px) {
      .container { padding: 0 12px; }
      .cards-grid { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
      #allParticipantsList ol { padding-left: 20px; }
      .trip-calendar-day {
        font-size: 0.8rem;
      }
      .trip-player-chip {
        font-size: 0.72rem;
      }
    }
  </style>
</head>

    const DEFAULT_TRIP = {

      package: '4 Nights / 5 Rounds',

      preparedBy: 'Myrtle Beach Golf Trips',
      phone: '(877) 283-2122',

      accommodations: {
        resort: 'Barefoot Golf Villas',

        units: 6,

        arrivalDate: MYRTLE_ARRIVAL_DATE,
        departureDate: MYRTLE_DEPARTURE_DATE
      }
    };
    const parseTimeMinutes = (value) => {
      const match = /^(\d{1,2}):(\d{2})$/.exec(String(value || '').trim());
      if (!match) return null;
      const hh = Number(match[1]);
      const mm = Number(match[2]);
      if (!Number.isInteger(hh) || !Number.isInteger(mm) || hh < 0 || hh > 23 || mm < 0 || mm > 59) return null;
      return (hh * 60) + mm;
    };
    const minutesToHHMM = (totalMinutes) => {
      if (!Number.isFinite(totalMinutes)) return '';
      const inDay = ((Math.round(totalMinutes) % 1440) + 1440) % 1440;
      const hh = String(Math.floor(inDay / 60)).padStart(2, '0');
      const mm = String(inDay % 60).padStart(2, '0');
      return `${hh}:${mm}`;
    };
    const buildTripSlots = (firstTime, groups = []) => {
      const startMinutes = parseTimeMinutes(firstTime);
      return groups.map((players, index) => {
        const slotMinutes = startMinutes === null ? null : startMinutes + (index * 9);
        return {
          label: `TT#${index + 1}`,
          time: slotMinutes === null ? '' : minutesToHHMM(slotMinutes),
          players: Array.isArray(players) ? players.map((name) => String(name || '').trim()).filter(Boolean) : []

        if (match) {
          const [, year, month, day] = match;
          return `${Number(month)}/${Number(day)}/${year}`;
        }
      }
      const parsed = new Date(d);
      return Number.isNaN(parsed.getTime()) ? '' : parsed.toLocaleDateString();
    };
    const tripApi = (path) => (path.includes('?') ? `${path}&myrtleBeach2026=true` : `${path}?myrtleBeach2026=true`);
    const safeNumber = (val) => (val === '' || isNaN(val) ? 0 : parseFloat(val));
    const getCondoCount = () => {
      const size = Number(trip?.baseGroupSize) || Number(trip?.groupSize) || DEFAULT_TRIP.groupSize;
      return Math.max(1, Math.ceil(size / 4));
    };
    const getCondoNumber = (assignment) => {
      const match = assignment && assignment.match(/^Condo (\d+) - Room ([AB])$/);
      const condoNum = match ? parseInt(match[1], 10) : null;
      return Number.isFinite(condoNum) ? condoNum : null;
    };
    const buildWazeLink = (course, address) => {
      const query = address || course;
      if (!query) return '';
      // Use Waze deep link that works on mobile (opens app) and desktop (opens web map)
      return `https://ul.waze.com/ul?q=${encodeURIComponent(query)}&navigate=yes`;
    };
    const toIsoDate = (val) => {
      const str = String(val || '').trim();
      const m = /^(\d{4}-\d{2}-\d{2})/.exec(str);
      if (m) return m[1];
      const d = new Date(str);
      if (Number.isNaN(d.getTime())) return '';
      const y = d.getUTCFullYear();
      const month = String(d.getUTCMonth() + 1).padStart(2, '0');
      const day = String(d.getUTCDate()).padStart(2, '0');
      return `${y}-${month}-${day}`;
    };
    const toHHMM = (val) => {
      const str = String(val || '').trim();
      const m = /^(\d{1,2}):(\d{2})/.exec(str);
      if (!m) return '';
      const hh = String(Math.max(0, Math.min(23, Number(m[1]) || 0))).padStart(2, '0');
      const mm = String(Math.max(0, Math.min(59, Number(m[2]) || 0))).padStart(2, '0');
      return `${hh}:${mm}`;
    };
    const formatDateLong = (value) => {
      const iso = toIsoDate(value);
      if (!iso) return '';
      const [year, month, day] = iso.split('-').map(Number);
      if (!Number.isInteger(year) || !Number.isInteger(month) || !Number.isInteger(day)) return '';
      const local = new Date(year, month - 1, day, 12, 0, 0);
      return local.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    };
    const formatTime12 = (value) => {
      const hhmm = toHHMM(value);
      if (!hhmm) return '';
      const [hhRaw, mm] = hhmm.split(':');
      const hh = Number(hhRaw);
      const period = hh >= 12 ? 'PM' : 'AM';
      const hour12 = ((hh + 11) % 12) + 1;
      return `${hour12}:${mm} ${period}`;
    };
    const plusMinutes = (value, deltaMinutes) => {
      const start = parseTimeMinutes(value);
      if (start === null) return '';
      return minutesToHHMM(start + deltaMinutes);
    };
    const escapeHtml = (value) => String(value || '').replace(/[&<>"]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
    const normalizeRoundSlot = (slot = {}, index = 0) => ({
      label: String(slot.label || `TT#${index + 1}`).trim() || `TT#${index + 1}`,
      time: toHHMM(slot.time),
      players: Array.isArray(slot.players) ? slot.players.map((name) => String(name || '').trim()).filter(Boolean) : []
    });
    const normalizeRound = (raw = {}) => {
      const normalizedSlots = Array.isArray(raw.teeTimes)
        ? raw.teeTimes.map((slot, index) => normalizeRoundSlot(slot, index)).filter((slot) => slot.time || slot.players.length || slot.label)
        : [];
      const roundTime = toHHMM(raw.time || normalizedSlots[0]?.time || '');
      if (!normalizedSlots.length && roundTime) {
        normalizedSlots.push(normalizeRoundSlot({ label: 'TT#1', time: roundTime, players: [] }, 0));
      }
      if (normalizedSlots.length && !normalizedSlots[0].time && roundTime) {
        normalizedSlots[0].time = roundTime;
      }
      return {
        course: String(raw.course || '').trim(),
        address: String(raw.address || '').trim(),
        date: toIsoDate(raw.date),

      return rounds.slice().sort((a, b) => {
        const dateA = toIsoDate(a && a.date);
        const dateB = toIsoDate(b && b.date);
        if (dateA && dateB && dateA !== dateB) return dateA.localeCompare(dateB);
        const timeA = toHHMM((a && a.time) || '');
        const timeB = toHHMM((b && b.time) || '');
        if (timeA && timeB && timeA !== timeB) return timeA.localeCompare(timeB);
        return String((a && a.course) || '').localeCompare(String((b && b.course) || ''));
      });

    const TRIP_ICS_DURATION_MINUTES = 270;
    const TRIP_ICS_REMINDER_MINUTES = [4320, 1440];

    function formatCalendarStamp(dateObj) {
      const yyyy = String(dateObj.getFullYear()).padStart(4, '0');
      const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
      const dd = String(dateObj.getDate()).padStart(2, '0');
      const hh = String(dateObj.getHours()).padStart(2, '0');
      const min = String(dateObj.getMinutes()).padStart(2, '0');
      const sec = String(dateObj.getSeconds()).padStart(2, '0');
      return `${yyyy}${mm}${dd}T${hh}${min}${sec}`;
    }

    function escapeIcs(value = '') {
      return String(value || '')
        .replace(/\\/g, '\\\\')
        .replace(/\r?\n/g, '\\n')
        .replace(/,/g, '\\,')
        .replace(/;/g, '\\;');
    }

    function getRoundPrimaryTime(round = {}) {
      const slotWithTime = (round.teeTimes || []).find((slot) => slot && slot.time);
      return toHHMM((slotWithTime && slotWithTime.time) || round.time || '');
    }

    function buildRoundGoogleCalendarUrl(round = {}) {
      const dateISO = toIsoDate(round.date);
      const startTime = getRoundPrimaryTime(round);
      if (!dateISO || !startTime) return '';
      const [year, month, day] = dateISO.split('-').map(Number);
      const [hh, mm] = startTime.split(':').map(Number);
      const start = new Date(year, month - 1, day, hh, mm, 0);
      const end = new Date(start.getTime() + (TRIP_ICS_DURATION_MINUTES * 60 * 1000));
      const firstLabel = round.teeTimes?.[0]?.label ? `${round.teeTimes[0].label} ${formatTime12(round.teeTimes[0].time)}` : formatTime12(startTime);
      const details = [
        `Trip Tee Time`,
        `Course: ${round.course || 'Course TBD'}`,
        `Date: ${formatDateLong(dateISO)}`,
        firstLabel ? `First Tee: ${firstLabel}` : '',
      ].filter(Boolean).join('\n');
      const params = new URLSearchParams();
      params.set('action', 'TEMPLATE');
      params.set('text', `${round.course || 'Golf Round'} Tee Time`);
      params.set('details', details);
      params.set('location', round.address || round.course || 'Golf Course');
      params.set('dates', `${formatCalendarStamp(start)}/${formatCalendarStamp(end)}`);
      params.set('ctz', 'America/New_York');
      return `https://calendar.google.com/calendar/render?${params.toString()}`;
    }

    function buildTripMonthIcs(rounds = [], monthDate = new Date()) {
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      const monthRounds = rounds.filter((round) => {
        const dateISO = toIsoDate(round.date);
        if (!dateISO) return false;
        const [y, m] = dateISO.split('-').map(Number);
        return y === year && (m - 1) === month;
      });
      if (!monthRounds.length) return '';
      const nowUtc = new Date();
      const dtstamp = `${String(nowUtc.getUTCFullYear()).padStart(4, '0')}${String(nowUtc.getUTCMonth() + 1).padStart(2, '0')}${String(nowUtc.getUTCDate()).padStart(2, '0')}T${String(nowUtc.getUTCHours()).padStart(2, '0')}${String(nowUtc.getUTCMinutes()).padStart(2, '0')}${String(nowUtc.getUTCSeconds()).padStart(2, '0')}Z`;
      const lines = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Tee Time Manager//Myrtle Beach Trip//EN',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH',
      ];
      monthRounds.forEach((round, roundIndex) => {
        const dateISO = toIsoDate(round.date);
        const slots = (round.teeTimes || []).length
          ? round.teeTimes
          : [{ label: 'TT#1', time: toHHMM(round.time), players: [] }];
        slots.forEach((slot, slotIndex) => {
          const startTime = toHHMM(slot.time || round.time);
          if (!dateISO || !startTime) return;
          const endTime = plusMinutes(startTime, TRIP_ICS_DURATION_MINUTES);
          const [yearN, monthN, dayN] = dateISO.split('-').map(Number);
          const [startH, startM] = startTime.split(':').map(Number);
          const [endH, endM] = endTime.split(':').map(Number);
          const startDate = new Date(yearN, monthN - 1, dayN, startH, startM, 0);
          const endDate = new Date(yearN, monthN - 1, dayN, endH, endM, 0);
          const uid = `${dateISO}-${slotIndex + 1}-${roundIndex + 1}-myrtle-trip@teetime.local`;
          const label = slot.label || `TT#${slotIndex + 1}`;
          const playersLine = (slot.players || []).length ? `Players: ${(slot.players || []).join(', ')}` : 'Players: Open spots';
          const description = [
            `Trip tee time`,
            `Course: ${round.course || 'Course TBD'}`,
            `Date: ${formatDateLong(dateISO)}`,
            `${label}: ${formatTime12(startTime)}`,
            playersLine,
          ].join('\n');
          lines.push('BEGIN:VEVENT');
          lines.push(`UID:${escapeIcs(uid)}`);
          lines.push(`DTSTAMP:${dtstamp}`);
          lines.push(`SUMMARY:${escapeIcs(`${round.course || 'Golf Round'} - ${label}`)}`);
          lines.push(`DESCRIPTION:${escapeIcs(description)}`);
          lines.push(`LOCATION:${escapeIcs(round.address || round.course || 'Golf Course')}`);
          lines.push(`DTSTART;TZID=America/New_York:${formatCalendarStamp(startDate)}`);
          lines.push(`DTEND;TZID=America/New_York:${formatCalendarStamp(endDate)}`);
          TRIP_ICS_REMINDER_MINUTES.forEach((minutes) => {
            lines.push('BEGIN:VALARM');
            lines.push(`TRIGGER:-PT${minutes}M`);
            lines.push('ACTION:DISPLAY');
            lines.push(`DESCRIPTION:${escapeIcs(`Reminder: ${round.course || 'Golf Round'} ${label}`)}`);
            lines.push('END:VALARM');
          });
          lines.push('END:VEVENT');
        });
      });
      lines.push('END:VCALENDAR');
      return `${lines.join('\r\n')}\r\n`;
    }

    function downloadTripMonthIcs(rounds = [], monthDate = new Date()) {
      const ics = buildTripMonthIcs(rounds, monthDate);
      if (!ics) return false;
      const monthLabel = monthDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' }).replace(/\s+/g, '-').toLowerCase();
      const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `myrtle-trip-${monthLabel}.ics`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1200);
      return true;
    }

    function createTripCalendarDay(day, year, month, isOtherMonth, eventDates) {
      const dayEl = document.createElement('button');
      dayEl.type = 'button';
      dayEl.className = 'trip-calendar-day';
      dayEl.textContent = String(day);
      if (isOtherMonth) dayEl.classList.add('other-month');
      const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      if (eventDates.has(dateStr)) dayEl.classList.add('has-events');
      if (tripScheduleState.selectedDate && dateStr === tripScheduleState.selectedDate) dayEl.classList.add('selected');
      const todayIso = toIsoDate(new Date());
      if (dateStr === todayIso) dayEl.classList.add('today');
      dayEl.addEventListener('click', () => {
        if (isOtherMonth) {
          tripScheduleState.currentDate = new Date(year, month, 1);
        }
        tripScheduleState.selectedDate = dateStr;
        renderTripSchedule(getTripRounds());
      });
      return dayEl;
    }

    function renderTripCalendar(rounds = []) {
      const monthEl = document.getElementById('tripCurrentMonth');
      const gridEl = document.getElementById('tripCalendarGrid');
      const monthLinkEl = document.getElementById('tripMonthCalendarLink');
      if (!monthEl || !gridEl || !monthLinkEl) return;
      const year = tripScheduleState.currentDate.getFullYear();
      const month = tripScheduleState.currentDate.getMonth();
      const firstOfMonth = new Date(year, month, 1);
      const fullMonth = firstOfMonth.toLocaleDateString(undefined, { month: 'long' });
      monthEl.textContent = firstOfMonth.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
      monthLinkEl.textContent = `Add tee times to your calendar for ${fullMonth}`;
      monthLinkEl.setAttribute('title', `Download all ${fullMonth} tee times`);
      gridEl.innerHTML = '';
      ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach((name) => {
        const head = document.createElement('div');
        head.className = 'trip-calendar-day-header';
        head.textContent = name;
        gridEl.appendChild(head);
      });
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();
      const eventDates = new Set(rounds.map((round) => toIsoDate(round.date)).filter(Boolean));
      for (let i = firstDay - 1; i >= 0; i--) {
        const prevDay = daysInPrevMonth - i;
        let prevYear = year;
        let prevMonth = month - 1;
        if (prevMonth < 0) {
          prevMonth = 11;
          prevYear -= 1;
        }
        gridEl.appendChild(createTripCalendarDay(prevDay, prevYear, prevMonth, true, eventDates));
      }
      for (let day = 1; day <= daysInMonth; day++) {
        gridEl.appendChild(createTripCalendarDay(day, year, month, false, eventDates));
      }
      const usedCells = firstDay + daysInMonth;
      const trailingCells = usedCells % 7 === 0 ? 0 : 7 - (usedCells % 7);
      for (let day = 1; day <= trailingCells; day++) {
        let nextYear = year;
        let nextMonth = month + 1;
        if (nextMonth > 11) {
          nextMonth = 0;
          nextYear += 1;
        }
        gridEl.appendChild(createTripCalendarDay(day, nextYear, nextMonth, true, eventDates));
      }
    }

                <div class="trip-event-actions">

                  ${waze ? `<a class="trip-event-link" href="${waze}" target="_blank" rel="noopener">Waze</a>` : ''}
                </div>

    function renderTripSchedule(rounds = []) {
      const usableRounds = sortRounds(rounds.map(normalizeRound));
      const availableDates = usableRounds.map((round) => toIsoDate(round.date)).filter(Boolean);
      if (!availableDates.length) {
        tripScheduleState.selectedDate = '';
        renderTripCalendar([]);
        renderTripEvents([]);
        return;
      }
      if (!tripScheduleState.selectedDate || !availableDates.includes(toIsoDate(tripScheduleState.selectedDate))) {
        tripScheduleState.selectedDate = availableDates[0];
      }
      const selected = toIsoDate(tripScheduleState.selectedDate);
      if (selected) {
        const [year, month] = selected.split('-').map(Number);
        if (Number.isInteger(year) && Number.isInteger(month)) {
          tripScheduleState.currentDate = new Date(year, month - 1, 1);
        }
      }
      renderTripCalendar(usableRounds);
      renderTripEvents(usableRounds);
    }

    function renderItinerary() {
      $('#itineraryBox').innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">

          <aside class="trip-calendar-sidebar">
            <div class="trip-calendar-header">
              <button type="button" id="tripPrevMonth" class="trip-calendar-nav" title="Previous month">‹</button>
              <div class="trip-calendar-month-controls">
                <h3 id="tripCurrentMonth" class="trip-calendar-month">Month Year</h3>
                <a id="tripMonthCalendarLink" class="trip-calendar-month-link" href="#">Add tee times to your calendar for this month</a>
              </div>
              <button type="button" id="tripNextMonth" class="trip-calendar-nav" title="Next month">›</button>
            </div>
            <div id="tripCalendarGrid" class="trip-calendar-grid"></div>
          </aside>
          <section class="trip-events-container">
            <div class="trip-events-header">
              <h3 id="tripSelectedDateTitle" class="trip-events-title">Select a date</h3>
              <span id="tripRoundCount" class="trip-events-meta"></span>
            </div>
            <div id="tripEvents"></div>
          </section>
        </div>
        <div id="condoWazeLinks" style="margin-top:12px;"></div>
        <div id="allParticipantsList" style="margin-top:12px;"></div>
      `;

      const rounds = getTripRounds();
      renderTripSchedule(rounds);

      const prevBtn = document.getElementById('tripPrevMonth');
      const nextBtn = document.getElementById('tripNextMonth');
      const monthLink = document.getElementById('tripMonthCalendarLink');
      if (prevBtn) {
        prevBtn.addEventListener('click', () => {
          tripScheduleState.currentDate = new Date(tripScheduleState.currentDate.getFullYear(), tripScheduleState.currentDate.getMonth() - 1, 1);
          renderTripCalendar(getTripRounds());
        });
      }
      if (nextBtn) {
        nextBtn.addEventListener('click', () => {
          tripScheduleState.currentDate = new Date(tripScheduleState.currentDate.getFullYear(), tripScheduleState.currentDate.getMonth() + 1, 1);
          renderTripCalendar(getTripRounds());
        });
      }
      if (monthLink) {
        monthLink.addEventListener('click', (event) => {
          event.preventDefault();
          const ok = downloadTripMonthIcs(getTripRounds(), tripScheduleState.currentDate);
          if (!ok) alert('No tee times for this month yet.');
        });
      }

      const condoWazeLinks = $('#condoWazeLinks');
      if (condoWazeLinks) {
        condoWazeLinks.innerHTML = `
          <div style="display:grid;gap:8px;">
            <strong>Condo Waze Links</strong>
            <ul class="itinerary-list">
              ${CONDO_ADDRESSES.map((c) => {
                const link = buildWazeLink(c.label, c.address);
                return `
                  <li class="itinerary-item">
                    <strong><a class="waze-link" href="${link}" target="_blank" rel="noopener">${c.label}</a></strong>
                    <small>${c.unit} | ${c.address}</small>
                    <small><strong>Staying:</strong> ${c.occupants.join(', ')}</small>
                    <small><a class="waze-link" href="${c.guestbook}" target="_blank" rel="noopener">LINK TO CONDO INFORMATION</a></small>
                  </li>
                `;
              }).join('')}
            </ul>
          </div>
        `;
      }

      renderStatusList();

      const inCount = participants.filter((p) => p.status === 'in').length;
      const nextIncrement = Math.ceil(Math.max(inCount, 1) / 4) * 4;
      const needed = Math.max(nextIncrement - inCount, 0);
      const statusRow = $('#statusSummaryRow');
      if (statusRow) {
        statusRow.innerHTML = `
          <div class="status-box" style="display:grid;gap:6px;background:var(--panel-soft);border:1px solid var(--border);border-radius:12px;padding:12px;">
            <strong>Confirmed Golfers: <span style="color:var(--accent);">${inCount}</span></strong>
            <span style="color:var(--muted);font-size:0.95rem;">
              ${needed > 0
                ? `Need ${needed} more to reach the next full group of 4.`
                : `We have a full group of ${inCount}. Next target: ${nextIncrement + 4}.`}
            </span>
          </div>
        `;
      }
    }

    function renderStatusList() {
      if (!Array.isArray(participants) || !participants.length) {
        $('#allParticipantsList').innerHTML = '';
        return;
      }
      const counts = { in: 0, out: 0, maybe: 0, waitlist: 0, invited: 0 };
      participants.forEach((p) => { if (counts.hasOwnProperty(p.status)) counts[p.status]++; });

      const sorted = [...participants].sort((a, b) => {
        const sa = STATUS_ORDER.indexOf(a.status);
        const sb = STATUS_ORDER.indexOf(b.status);
        if (sa !== sb) return sa - sb;
        return (a.name || '').localeCompare(b.name || '');
      });
      const perCol = Math.ceil(sorted.length / 2);
      const cols = [sorted.slice(0, perCol), sorted.slice(perCol)];

      let tableHtml = `
        <div class="status-grid">
          ${STATUS_ORDER.map((s) => `<div class="status-pill"><span>${STATUS_LABELS[s]}</span><strong>${counts[s]}</strong></div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;">
      `;
      for (let colIdx = 0; colIdx < cols.length; colIdx++) {
        const col = cols[colIdx];
        const start = colIdx * perCol + 1;
        tableHtml += `<ol start='${start}' style='margin:0;padding-left:18px;display:grid;gap:6px;'>${col.map((p) =>
          `<li style="margin:0;display:grid;gap:6px;">
            <div style="font-weight:600;color:#fff;">${p.name}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
              <select class='golfer-status-dropdown' data-id='${p._id}' style='font-size:13px;padding:8px;border-radius:8px;border:1px solid var(--border);background:#0b1728;color:var(--ink);'>
                ${STATUS_ORDER.map((opt) => `<option value='${opt}'${p.status === opt ? ' selected' : ''}>${STATUS_LABELS[opt]}</option>`).join('')}
              </select>
              <input type='number' class='golfer-paid-input' data-id='${p._id}' value='${(p.totalPaidAmount || 0).toFixed(2)}' min='0' step='0.01' style='padding:8px;border-radius:8px;border:1px solid var(--border);background:#0b1728;color:var(--ink);' placeholder='Paid'>
            </div>
          </li>`
        ).join('')}</ol>`;
      }
      tableHtml += `</div>`;
      $('#allParticipantsList').innerHTML = tableHtml;

      document.querySelectorAll('.golfer-status-dropdown').forEach((sel) => {
        sel.addEventListener('change', async function () {
          await updateParticipant(this.dataset.id, { status: this.value }, { requireAdmin: true });
        });
      });
      document.querySelectorAll('.golfer-paid-input').forEach((input) => {
        input.addEventListener('change', async function () {
          await updateParticipant(this.dataset.id, { totalPaidAmount: safeNumber(this.value) }, { requireAdmin: true });
        });
      });
    }

    function renderBaseGroupSizeSelect() {
      const select = $('#baseGroupSizeSelect');
      if (!select) return;
      select.innerHTML = '';
      BASE_GROUP_SIZES.forEach((n) => {
        const opt = document.createElement('option');
        opt.value = n;
        opt.textContent = `${n} players`;
        if (trip?.baseGroupSize == n) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function renderParticipants() {
      const container = document.getElementById('condoGroups');
      if (!container) return;
      container.innerHTML = '';

      const condoCount = getCondoCount();
      const condoCounts = Array(condoCount).fill(0);
      participants.forEach((g) => {
        const condoNum = getCondoNumber(g.roomAssignment);
        if (!condoNum) return;
        const idx = condoNum - 1;
        if (idx >= 0 && idx < condoCount) condoCounts[idx]++;
      });

      for (let i = 0; i < condoCount; i++) {
        const div = document.createElement('div');
        div.className = 'condo-group';
        div.innerHTML = `<strong>Condo ${i + 1}</strong><div class="cards-grid"></div>`;
        const grid = div.querySelector('.cards-grid');
        const group = participants.filter((p) => {
          return getCondoNumber(p.roomAssignment) === i + 1;
        });
        for (const p of group) {
          const match = p.roomAssignment && p.roomAssignment.match(/^Condo (\d+) - Room ([AB])$/);
          const room = match ? match[2] : '';
          const currentCondo = getCondoNumber(p.roomAssignment);
          let moveOptions = `<option value="unassigned">Unassigned</option>`;
          for (let c = 1; c <= condoCount; c++) {
            if (c !== currentCondo && condoCounts[c - 1] < 4) moveOptions += `<option value="${c}">Condo ${c}</option>`;
          }
          const card = document.createElement('div');
          card.className = 'participant-card';
          card.innerHTML = `
            <div class="fields-row">
              <label class="stacked"><span>Name</span><input type="text" value="${p.name || ''}" data-id="${p._id}" class="name-input"></label>
              <label class="stacked"><span>Room</span><select class="room-select" data-id="${p._id}">
                <option value="A"${room === 'A' ? ' selected' : ''}>A</option>
                <option value="B"${room === 'B' ? ' selected' : ''}>B</option>
              </select></label>
              <label class="stacked"><span>Extra Night</span><input type="checkbox" ${p.wantsExtraNight ? 'checked' : ''} class="extra-night-input" data-id="${p._id}"></label>
            </div>
            <div class="actions">
              <button class="remove-condo-btn" data-id="${p._id}">Unassign</button>
              ${moveOptions ? `<select class="move-condo-select" data-id="${p._id}" style="padding:10px;border-radius:10px;border:1px solid var(--border);background:#0b1728;color:var(--ink);"><option value="">Move to...</option>${moveOptions}</select>` : ''}
            </div>
          `;
          grid.appendChild(card);
        }
        container.appendChild(div);
      }

      const unassigned = participants.filter((p) => {
        const condoNum = getCondoNumber(p.roomAssignment);
        return !condoNum || condoNum < 1 || condoNum > condoCount;
      });
      const unassignedSidebar = document.getElementById('unassignedSidebar');
      if (unassignedSidebar) {
        unassignedSidebar.innerHTML = `
          <div style="display:grid;gap:8px;">
            <div>
              <label style="color:var(--ink-soft);font-size:0.9rem;">Base Group Size</label>
              <select name="baseGroupSize" id="baseGroupSizeSelect" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);background:#0b1728;color:var(--ink);"></select>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
              <strong>Unassigned</strong>
              <span style="color:var(--muted);font-size:0.9rem;">${unassigned.length}</span>
            </div>
            <div style="max-height:420px;overflow-y:auto;">
              <ul id="unassignedList"></ul>
            </div>
          </div>
        `;
        renderBaseGroupSizeSelect();
      }

      const ul = document.getElementById('unassignedList');
      if (!ul || !unassignedSidebar) return;
      ul.innerHTML = '';
      if (!unassigned.length) {
        ul.innerHTML = `<li style="color:var(--muted);">Everyone is assigned.</li>`;
      } else {
        const condoOptions = Array.from({ length: condoCount }, (_, idx) => `<option value="${idx + 1}">Condo ${idx + 1}</option>`).join('');
        unassigned.forEach((p) => {
          const li = document.createElement('li');
          li.innerHTML = `
            <div style="margin-bottom:6px;font-weight:600;">${p.name}</div>
            <select class="assign-condo-select" data-id="${p._id}">
              <option value="">Assign to condo...</option>
              ${condoOptions}
            </select>
            <button class="remove-golfer-btn" data-id="${p._id}" style="margin-top:8px;background:#c93636;color:#fff;">Delete</button>
          `;
          ul.appendChild(li);
        });
      }

      if (unassignedSidebar._changeHandler) unassignedSidebar.removeEventListener('change', unassignedSidebar._changeHandler);
      unassignedSidebar._changeHandler = async function (e) {
        if (e.target.classList.contains('assign-condo-select')) {
          const condoNum = Number(e.target.value);
          const id = e.target.dataset.id;
          if (!condoNum || condoNum < 1 || condoNum > condoCount) return;
          await updateParticipant(id, { roomAssignment: `Condo ${condoNum} - Room A` }, { requireAdmin: true });
        }
        if (e.target.id === 'baseGroupSizeSelect') {
          await fetch(tripApi(`/api/trips/${tripId}`), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ baseGroupSize: Number(e.target.value) || undefined })
          });
          await loadTrip();
        }
      };
      unassignedSidebar.addEventListener('change', unassignedSidebar._changeHandler);

      if (unassignedSidebar._removeHandler) unassignedSidebar.removeEventListener('click', unassignedSidebar._removeHandler);
      unassignedSidebar._removeHandler = async function (e) {
        if (e.target.classList.contains('remove-golfer-btn')) {
          const code = getAdminCode();
          if (!code) return;
          const id = e.target.dataset.id;
          if (!confirm('Remove this golfer from the event?')) return;
          await fetch(tripApi(`/api/trips/${tripId}/participants/${id}`), {
            method: 'DELETE',
            headers: { 'x-admin-code': code }
          });
          await loadTrip();
        }
      };
      unassignedSidebar.addEventListener('click', unassignedSidebar._removeHandler);
    }

    const condoGroups = document.getElementById('condoGroups');
    if (condoGroups) {
      condoGroups.addEventListener('click', async function (e) {
        if (e.target.classList.contains('move-condo-select')) {
          const id = e.target.dataset.id;
          const val = e.target.value;
          if (!val) return;
          const condoCount = getCondoCount();
          if (val === 'unassigned') {
            await updateParticipant(id, { roomAssignment: null }, { requireAdmin: true });
          } else if (Number(val) >= 1 && Number(val) <= condoCount) {
            await updateParticipant(id, { roomAssignment: `Condo ${val} - Room A` }, { requireAdmin: true });
          }
        }
        if (e.target.classList.contains('remove-condo-btn')) {
          const id = e.target.dataset.id;
          await updateParticipant(id, { roomAssignment: null }, { requireAdmin: true });
        }
      });
      condoGroups.addEventListener('change', async function (e) {
        if (e.target.classList.contains('room-select')) {
          const id = e.target.dataset.id;
          const room = e.target.value;
          const match = participants.find((p) => p._id === id)?.roomAssignment?.match(/^Condo (\d+) - Room ([AB])$/);
          const condoNum = match ? match[1] : null;
          if (condoNum) {
            await updateParticipant(id, { roomAssignment: `Condo ${condoNum} - Room ${room}` }, { requireAdmin: true });
          }
        }
        if (e.target.classList.contains('name-input')) {
          const id = e.target.dataset.id;
          await updateParticipant(id, { name: e.target.value });
        }
        if (e.target.classList.contains('extra-night-input')) {
          const id = e.target.dataset.id;
          await updateParticipant(id, { wantsExtraNight: e.target.checked });
        }
      });
    }

    const addBtn = document.getElementById('addParticipantBtn');
    if (addBtn) {
      addBtn.onclick = async function () {
        const name = prompt('Golfer name:');
        if (!name) return;
        await fetch(tripApi(`/api/trips/${tripId}/participants`), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, status: 'invited' })
        });
        await loadTrip();
      };
    }

    window.addEventListener('DOMContentLoaded', loadTrip);
  </script>
</body>
</html>
