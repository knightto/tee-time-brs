<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Myrtle Prize Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/knight-club-icon.png">
  <style>
    :root { --bg:#0d1726; --panel:#0f2138; --panel-soft:#132a45; --accent:#e0b457; --accent-2:#6dd3ff; --ink:#e6edf7; --ink-soft:#9fb6d4; --border:rgba(255,255,255,0.08); --shadow:0 20px 50px rgba(0,0,0,0.35); --radius:16px; }
    * { box-sizing:border-box; }
    body { font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif; background:radial-gradient(circle at 20% 20%, rgba(109,211,255,0.08), transparent 35%), radial-gradient(circle at 80% 0%, rgba(224,180,87,0.10), transparent 30%), #0b1422; margin:0; color:var(--ink); min-height:100vh; }
    .container { max-width:1160px; margin:16px auto 32px; padding:0 16px 28px; }
    .hero, .panel, .card { background:linear-gradient(145deg, var(--panel) 0%, #0c1a2c 100%); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
    .hero { padding:16px; position:sticky; top:0; z-index:10; backdrop-filter:blur(8px); }
    .hero-row, .section-head, .row, .summary-grid { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
    .hero-links, .pill-row { display:flex; gap:8px; flex-wrap:wrap; }
    .hero-link, .back-link { display:inline-flex; align-items:center; justify-content:center; min-height:34px; padding:8px 11px; border-radius:999px; border:1px solid rgba(109,211,255,0.28); background:rgba(109,211,255,0.10); color:#d7f0ff; text-decoration:none; font-size:0.84rem; font-weight:700; }
    .hero-link:hover, .back-link:hover { background:rgba(109,211,255,0.18); text-decoration:none; }
    .back-link { position:fixed; top:12px; left:12px; z-index:999; background:#0c1a2c; color:#f9fafb; }
    h1 { margin:0; font-size:clamp(1.4rem, 4vw, 2rem); display:flex; align-items:baseline; gap:10px; letter-spacing:0.4px; }
    h1 span { color:var(--accent); font-size:0.9rem; letter-spacing:1px; text-transform:uppercase; }
    h2, h3, strong { color:#fff; }
    .hero-copy, .section-copy { display:grid; gap:4px; }
    .note, .empty { color:var(--ink-soft); font-size:0.85rem; line-height:1.45; }
    .panel { padding:16px; margin-top:14px; }
    .card { padding:12px; }
    .pill { padding:6px 10px; border-radius:999px; border:1px solid rgba(109,211,255,0.24); background:rgba(109,211,255,0.10); color:#d7f0ff; font-size:0.8rem; font-weight:700; }
    .grid-2 { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:12px; }
    .grid-3 { display:grid; grid-template-columns:repeat(auto-fit, minmax(230px, 1fr)); gap:12px; }
    .metric { border:1px solid var(--border); border-radius:14px; background:rgba(255,255,255,0.04); padding:12px; display:grid; gap:6px; }
    .metric-value { font-size:1.7rem; font-weight:800; color:#fff; line-height:1.1; }
    .list { list-style:none; margin:0; padding:0; display:grid; gap:8px; }
    .list li, .audit-row { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
    .list li:last-child, .audit-row:last-child { border-bottom:0; padding-bottom:0; }
    .list li:first-child, .audit-row:first-child { padding-top:0; }
    .amount { font-weight:800; color:#fff; white-space:nowrap; }
    .section-label { font-size:0.78rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
    .detail-lines { display:grid; gap:8px; }
    @media (max-width:640px) { .container { padding:0 12px 24px; } .hero-links { width:100%; } .hero-link { flex:1 1 160px; } .back-link { position:static; display:inline-flex; margin:12px 12px 0; } }
  </style>
</head>
<body>
  <a class="back-link" data-trip-page-link href="/myrtle/trip-2026.html">← Myrtle Trip</a>
  <div class="container">
    <header class="hero">
      <div class="hero-row">
        <div class="hero-copy">
          <h1>Prize Report <span>Myrtle 2026</span></h1>
          <div class="note">Audit view showing how the full pot is allocated, what is already won, and what is still pending.</div>
        </div>
        <div class="hero-links">
          <a class="hero-link" data-standings-link href="/myrtle/leaderboard-and-prizes.html">Ryder Cup Standings</a>
          <a class="hero-link" data-trip-page-link href="/myrtle/trip-2026.html">Trip Page</a>
          <a class="hero-link" data-all-foursomes-link href="/myrtle/all-foursomes.html">All Foursomes</a>
          <a class="hero-link" data-lodging-link href="/myrtle/lodging-and-maps.html">Lodging + Maps</a>
        </div>
      </div>
    </header>
    <main id="reportBody" class="panel">
      <div class="empty">Loading Myrtle prize report...</div>
    </main>
  </div>
  <script>
    const MYRTLE_PRIMARY_TRIP_NAME = 'Myrtle Beach - Barefoot Group 3/18-3/22/26';
    const MYRTLE_ARRIVAL_DATE = '2026-03-18';
    let tripId = '';
    let competitionData = null;
    let loadError = '';
    const tripApi = (path) => (path.includes('?') ? `${path}&myrtleBeach2026=true` : `${path}?myrtleBeach2026=true`);
    const getRequestedTripId = () => { try { return String(new URLSearchParams(window.location.search).get('tripId') || '').trim(); } catch (_error) { return ''; } };
    const buildPageHref = (path = '') => { const currentTripId = String(tripId || getRequestedTripId() || '').trim(); return currentTripId ? `${path}${path.includes('?') ? '&' : '?'}tripId=${encodeURIComponent(currentTripId)}` : path; };
    const syncLinks = () => {
      document.querySelectorAll('[data-trip-page-link]').forEach((link) => { link.href = buildPageHref('/myrtle/trip-2026.html'); });
      document.querySelectorAll('[data-standings-link]').forEach((link) => { link.href = buildPageHref('/myrtle/leaderboard-and-prizes.html'); });
      document.querySelectorAll('[data-all-foursomes-link]').forEach((link) => { link.href = buildPageHref('/myrtle/all-foursomes.html'); });
      document.querySelectorAll('[data-lodging-link]').forEach((link) => { link.href = buildPageHref('/myrtle/lodging-and-maps.html'); });
    };
    const getIsoDateOnly = (value) => { if (!value) return ''; const parsed = value instanceof Date ? new Date(value.getTime()) : new Date(value); return Number.isNaN(parsed.getTime()) ? '' : parsed.toISOString().slice(0, 10); };
    const isMyrtleTripCandidate = (entry = {}) => /myrtle/i.test(String(entry && entry.name || '').trim()) || /myrtle/i.test(String(entry && entry.location || '').trim());
    const findPreferredMyrtleTrip = (trips = []) => {
      const requestedTripId = getRequestedTripId();
      const list = Array.isArray(trips) ? trips : [];
      if (requestedTripId) {
        const requested = list.find((entry) => String(entry && entry._id || '').trim() === requestedTripId);
        if (requested) return requested;
      }
      return list.find((entry) => String(entry && entry.name || '').trim() === MYRTLE_PRIMARY_TRIP_NAME)
        || list.find((entry) => isMyrtleTripCandidate(entry) && getIsoDateOnly(entry && entry.arrivalDate) === MYRTLE_ARRIVAL_DATE)
        || list.find((entry) => isMyrtleTripCandidate(entry))
        || null;
    };
    async function tripFetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const contentType = response.headers.get('content-type') || '';
      const payload = contentType.includes('application/json') ? await response.json() : await response.text();
      if (!response.ok) {
        const message = payload && typeof payload === 'object' ? (payload.error || payload.message) : String(payload || 'Request failed');
        throw new Error(message || 'Request failed');
      }
      return payload;
    }
    const escapeHtml = (value) => String(value == null ? '' : value).replace(/[&<>"]/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[char]));
    const normalizeNameKey = (value) => String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    const formatCurrency = (value) => { const num = Number(value); return Number.isFinite(num) ? num.toLocaleString(undefined, { style:'currency', currency:'USD' }) : '—'; };
    const formatWinnerList = (values = []) => Array.isArray(values) && values.length ? values.join(', ') : '';
    const buildCleanPrizeShares = (amount = 0, winners = []) => {
      const total = Number(amount);
      const winnerList = (Array.isArray(winners) ? winners : []).map((winner) => String(winner || '').trim()).filter(Boolean);
      if (!winnerList.length || !Number.isFinite(total) || total <= 0) return [];
      const units = Math.max(0, Math.round(total / 5));
      const baseUnits = Math.floor(units / winnerList.length);
      let remainder = units - (baseUnits * winnerList.length);
      return winnerList.map((winner) => {
        const nextUnits = baseUnits + (remainder > 0 ? 1 : 0);
        if (remainder > 0) remainder -= 1;
        return { name: winner, amount: nextUnits * 5 };
      });
    };
    const buildRowPrizeShares = (row = {}) => {
      const explicitShares = (Array.isArray(row && row.shareRows) ? row.shareRows : [])
        .map((share) => ({
          name: String(share && share.name || '').trim(),
          birdies: Math.max(0, Math.round(Number(share && share.birdies) || 0)),
          amount: Number(share && share.amount || 0),
        }))
        .filter((share) => share.name && share.amount > 0);
      return explicitShares.length ? explicitShares : buildCleanPrizeShares(row.amount, row.winners);
    };
    function buildPrizeAuditReport(ryderCup = {}) {
      const payout = ryderCup.payout || {};
      const rows = Array.isArray(payout.rows) ? payout.rows : [];
      const winnerRows = (Array.isArray(payout.winnerRows) ? payout.winnerRows : []).filter((row) => Number(row && row.amount || 0) > 0);
      const teams = Array.isArray(ryderCup.teams) ? ryderCup.teams : [];
      const teamNameByPlayer = new Map();
      teams.forEach((team) => (team.players || []).forEach((player) => {
        const key = normalizeNameKey(player && player.name);
        if (key) teamNameByPlayer.set(key, team.name || 'Team');
      }));
      const awardedRows = winnerRows
        .filter((row) => Array.isArray(row.winners) && row.winners.length)
        .map((row) => ({ ...row, cleanShares: buildRowPrizeShares(row) }));
      const leftoverRows = awardedRows
        .map((row) => ({
          key: `${row.key || 'row'}-leftover`,
          label: `${row.label || 'Prize'} Leftover Pot`,
          amount: Number(row && row.leftoverAmount || 0),
          winnerLabel: 'Rounded down birdie payouts',
        }))
        .filter((row) => row.amount > 0);
      const pendingRows = winnerRows
        .filter((row) => !(Array.isArray(row.winners) && row.winners.length))
        .concat(leftoverRows);
      const awardedAmount = awardedRows.reduce((sum, row) => sum + ((row.cleanShares || []).length
        ? (row.cleanShares || []).reduce((rowSum, share) => rowSum + Number(share && share.amount || 0), 0)
        : Number(row && row.amount || 0)), 0);
      const pendingAmount = pendingRows.reduce((sum, row) => sum + (Number(row && row.amount || 0)), 0);
      const auditedTotal = awardedAmount + pendingAmount;
      const playerTotalsMap = new Map();
      awardedRows.forEach((row) => {
        (row.cleanShares || []).forEach((share) => {
          const name = String(share && share.name || '').trim();
          if (!name) return;
          const key = normalizeNameKey(name);
          const existing = playerTotalsMap.get(key) || { name, teamName: teamNameByPlayer.get(key) || '', amount: 0, prizes: [] };
          existing.amount += Number(share.amount || 0);
          existing.prizes.push({ label: row.label || 'Prize', amount: Number(share.amount || 0), birdies: Math.max(0, Math.round(Number(share.birdies) || 0)) });
          playerTotalsMap.set(key, existing);
        });
      });
      const playerTotals = Array.from(playerTotalsMap.values()).sort((left, right) => {
        if (right.amount !== left.amount) return right.amount - left.amount;
        return left.name.localeCompare(right.name);
      });
      const sections = [
        { title:'Team Result', keys:new Set(['winningTeam']) },
        { title:'Daily Pots', keys:new Set(['dailyNet', 'dailyGross', 'dailyOver100Draw', 'dailyBirdiePot', 'dailyLongestPuttLastHole']) },
        { title:'Trip-Long Pots', keys:new Set(['weeklyNet', 'weeklyOver100Draw', 'closestToPin', 'birdiePool', 'leftoverPot', 'mvp']) },
      ].map((section) => ({
        title: section.title,
        rows: rows.filter((row) => row && section.keys.has(row.key) && Number(row.amount || 0) > 0),
      })).filter((section) => section.rows.length);
      return { payout, rows, winnerRows, sections, awardedRows, pendingRows, awardedAmount, pendingAmount, auditedTotal, playerTotals };
    }
    function renderReport() {
      syncLinks();
      const reportBody = document.getElementById('reportBody');
      const ryderCup = competitionData && competitionData.ryderCup ? competitionData.ryderCup : null;
      if (!ryderCup) {
        reportBody.innerHTML = `<div class="empty">${escapeHtml(loadError || 'Myrtle prize data is not available yet.')}</div>`;
        return;
      }
      const audit = buildPrizeAuditReport(ryderCup);
      const payout = audit.payout || {};
      const allAccountedFor = Math.abs((Number(payout.totalPot || 0)) - audit.auditedTotal) < 0.01;
      reportBody.innerHTML = `
        <div class="section-head">
          <div class="section-copy">
            <h2 style="margin:0 0 6px;">Prize Pool Audit</h2>
            <div class="note">This report rolls the whole Myrtle prize pool forward from category setup to actual winners.</div>
          </div>
          <div class="pill-row">
            <span class="pill">${escapeHtml(formatCurrency(payout.totalPot || 0))} configured pot</span>
            <span class="pill">${escapeHtml(formatCurrency(audit.auditedTotal || 0))} audited rows</span>
            <span class="pill">${escapeHtml(allAccountedFor ? 'Fully reconciled' : 'Needs review')}</span>
          </div>
        </div>
        <div class="grid-3" style="margin-top:12px;">
          <div class="metric"><strong>Total Pot</strong><div class="metric-value">${escapeHtml(formatCurrency(payout.totalPot || 0))}</div><div class="note">$100 per man across 20 golfers.</div></div>
          <div class="metric"><strong>Awarded So Far</strong><div class="metric-value">${escapeHtml(formatCurrency(audit.awardedAmount || 0))}</div><div class="note">${escapeHtml(`${audit.awardedRows.length} prize rows already have winners`)}</div></div>
          <div class="metric"><strong>Still Pending</strong><div class="metric-value">${escapeHtml(formatCurrency(audit.pendingAmount || 0))}</div><div class="note">${escapeHtml(`${audit.pendingRows.length} prize rows are still open`)}</div></div>
          <div class="metric"><strong>Side Games</strong><div class="metric-value">${escapeHtml(formatCurrency(payout.nonTeamAmount || 0))}</div><div class="note">Everything outside the winning-team payout.</div></div>
          <div class="metric"><strong>Winning Team Share</strong><div class="metric-value">${escapeHtml(formatCurrency(payout.teamAmount || 0))}</div><div class="note">Reserved for the final Ryder Cup winner.</div></div>
          <div class="metric"><strong>Over / Under</strong><div class="metric-value">${escapeHtml(formatCurrency((payout.totalPot || 0) - audit.auditedTotal))}</div><div class="note">${escapeHtml(allAccountedFor ? 'Configured total matches the detailed prize rows.' : 'Configured total and detailed prize rows do not match.')}</div></div>
        </div>
        <div class="grid-2" style="margin-top:14px;">
          <div class="card">
            <strong>Category Breakdown</strong>
            <div class="note" style="margin-top:4px;">High-level allocation of the pot.</div>
            <div class="detail-lines" style="margin-top:12px;">
              ${audit.sections.map((section) => `<div><div class="section-label">${escapeHtml(section.title || 'Section')}</div>${section.rows.map((row) => `<div class="audit-row"><div><strong>${escapeHtml(row.label || 'Prize')}</strong><div class="note">${escapeHtml(row.winnerLabel || 'Pending')}</div></div><div class="amount">${escapeHtml(formatCurrency(row.amount || 0))}</div></div>`).join('')}</div>`).join('') || '<div class="empty">No prize categories are configured yet.</div>'}
            </div>
          </div>
          <div class="card">
            <strong>Money Won By Player</strong>
            <div class="note" style="margin-top:4px;">Only prizes with actual winners are counted here. Birdie pools pay by recorded birdie count, each player rounds down to the lower whole dollar, and the leftover stays pending.</div>
            ${audit.playerTotals.length ? `<ul class="list" style="margin-top:12px;">${audit.playerTotals.map((player) => `<li><span><strong>${escapeHtml(player.name || 'Player')}</strong><br><span class="note">${escapeHtml(player.teamName || 'No team')} · ${escapeHtml(player.prizes.map((prize) => `${prize.label}${prize.birdies ? ` ${prize.birdies} ${prize.birdies === 1 ? 'birdie' : 'birdies'}` : ''} ${formatCurrency(prize.amount)}`).join(' | '))}</span></span><span class="amount">${escapeHtml(formatCurrency(player.amount || 0))}</span></li>`).join('')}</ul>` : `<div class="empty" style="margin-top:12px;">No prize winners have been saved yet.</div>`}
          </div>
        </div>
        <div class="grid-2" style="margin-top:14px;">
          <div class="card">
            <strong>Pending Prize Money</strong>
            <div class="note" style="margin-top:4px;">This is money that is still sitting in open prizes.</div>
            ${audit.pendingRows.length ? `<ul class="list" style="margin-top:12px;">${audit.pendingRows.map((row) => `<li><span><strong>${escapeHtml(row.label || 'Prize')}</strong><br><span class="note">${escapeHtml(row.winnerLabel || 'Pending')}</span></span><span class="amount">${escapeHtml(formatCurrency(row.amount || 0))}</span></li>`).join('')}</ul>` : `<div class="empty" style="margin-top:12px;">Every prize row currently has a winner.</div>`}
          </div>
          <div class="card">
            <strong>Awarded Prize Rows</strong>
            <div class="note" style="margin-top:4px;">Detailed audit trail of the money already paid out on paper.</div>
            ${audit.awardedRows.length ? `<ul class="list" style="margin-top:12px;">${audit.awardedRows.map((row) => `<li><span><strong>${escapeHtml(row.label || 'Prize')}</strong><br><span class="note">${escapeHtml([((row.cleanShares || []).map((share) => `${share.name}${share.birdies ? ` ${share.birdies} ${share.birdies === 1 ? 'birdie' : 'birdies'}` : ''} ${formatCurrency(share.amount)}`).join(' | ') || formatWinnerList(row.winners || []) || row.winnerLabel || 'Winner saved'), Number(row && row.leftoverAmount || 0) > 0 ? `Leftover Pot ${formatCurrency(row.leftoverAmount)}` : ''].filter(Boolean).join(' | '))}</span></span><span class="amount">${escapeHtml(formatCurrency(row.amount || 0))}</span></li>`).join('')}</ul>` : `<div class="empty" style="margin-top:12px;">No awarded prize rows yet.</div>`}
          </div>
        </div>
      `;
    }
    async function loadPage() {
      syncLinks();
      loadError = '';
      try {
        const trips = await tripFetchJson(tripApi('/api/trips'));
        const trip = findPreferredMyrtleTrip(trips);
        if (!trip) throw new Error(getRequestedTripId() ? 'Requested Myrtle trip not found.' : 'Myrtle trip not found.');
        tripId = trip._id;
        syncLinks();
        competitionData = await tripFetchJson(tripApi(`/api/trips/${tripId}/competition`));
      } catch (error) {
        loadError = error && error.message ? error.message : 'Failed to load Myrtle prize report.';
      }
      renderReport();
    }
    loadPage();
  </script>
</body>
</html>
