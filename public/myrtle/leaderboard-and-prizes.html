<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Myrtle Leaderboard and Prizes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/assets/knight-club-icon.png">
  <style>
    :root { --bg:#0d1726; --panel:#0f2138; --panel-soft:#132a45; --accent:#e0b457; --accent-2:#6dd3ff; --ink:#e6edf7; --ink-soft:#9fb6d4; --border:rgba(255,255,255,0.08); --shadow:0 20px 50px rgba(0,0,0,0.35); --radius:16px; }
    * { box-sizing:border-box; }
    body { font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif; background:radial-gradient(circle at 20% 20%, rgba(109,211,255,0.08), transparent 35%), radial-gradient(circle at 80% 0%, rgba(224,180,87,0.10), transparent 30%), #0b1422; margin:0; color:var(--ink); min-height:100vh; }
    .container { max-width:1120px; margin:16px auto 32px; padding:0 16px 28px; }
    .hero, .panel, .card { background:linear-gradient(145deg, var(--panel) 0%, #0c1a2c 100%); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
    .hero { padding:16px; position:sticky; top:0; z-index:10; backdrop-filter:blur(8px); }
    .hero-row, .section-head, .scoreboard, .card-head { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
    .hero-links, .pill-row, .scoreboard, .card-grid, .stack-grid { display:flex; gap:8px; flex-wrap:wrap; }
    .hero-links { justify-content:flex-end; }
    .hero-link, .back-link { display:inline-flex; align-items:center; justify-content:center; min-height:34px; padding:8px 11px; border-radius:999px; border:1px solid rgba(109,211,255,0.28); background:rgba(109,211,255,0.10); color:#d7f0ff; text-decoration:none; font-size:0.84rem; font-weight:700; }
    .hero-link:hover, .back-link:hover { background:rgba(109,211,255,0.18); text-decoration:none; }
    .back-link { position:fixed; top:12px; left:12px; z-index:999; background:#0c1a2c; color:#f9fafb; }
    h1 { margin:0; font-size:clamp(1.4rem, 4vw, 2rem); display:flex; align-items:baseline; gap:10px; letter-spacing:0.4px; }
    h1 span { color:var(--accent); font-size:0.9rem; letter-spacing:1px; text-transform:uppercase; }
    h2, h3, strong { color:#fff; }
    .hero-copy, .section-copy { display:grid; gap:4px; }
    .note, .empty { color:var(--ink-soft); font-size:0.85rem; line-height:1.45; }
    .panel { padding:16px; margin-top:14px; }
    .pill { padding:6px 10px; border-radius:999px; border:1px solid rgba(109,211,255,0.24); background:rgba(109,211,255,0.10); color:#d7f0ff; font-size:0.8rem; font-weight:700; }
    .score-box, .card { padding:12px; }
    .score-box { flex:1 1 220px; border:1px solid var(--border); border-radius:14px; background:rgba(255,255,255,0.04); }
    .score-box strong { display:block; font-size:1rem; }
    .score-value { font-size:1.8rem; font-weight:800; color:#fff; line-height:1.1; margin-top:6px; }
    .grid-2 { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:12px; }
    .grid-3 { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:12px; }
    .card-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); }
    .stack-grid { display:grid; gap:12px; }
    .list { list-style:none; margin:0; padding:0; display:grid; gap:8px; }
    .list li, .prize-row { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
    .list li:last-child, .prize-row:last-child { border-bottom:0; padding-bottom:0; }
    .list li:first-child, .prize-row:first-child { padding-top:0; }
    .prize-section-title { font-size:0.78rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
    .amount { font-weight:800; color:#fff; white-space:nowrap; }
    .rank-list { list-style:none; margin:0; padding:0; display:grid; gap:8px; }
    .rank-list li { border:1px solid rgba(255,255,255,0.06); border-radius:12px; background:rgba(255,255,255,0.03); padding:10px; display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
    .rank-list li span:last-child { text-align:right; white-space:nowrap; }
    .section-title { margin:0 0 6px; font-size:1.02rem; }
    .round-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:12px; }
    @media (max-width:640px) { .container { padding:0 12px 24px; } .hero-links { width:100%; } .hero-link { flex:1 1 160px; } .back-link { position:static; display:inline-flex; margin:12px 12px 0; } body { padding-top:0; } }
  </style>
</head>
<body>
  <a class="back-link" data-trip-page-link href="/myrtle/trip-2026.html">← Myrtle Trip</a>
  <div class="container">
    <header class="hero">
      <div class="hero-row">
        <div class="hero-copy">
          <h1>Leaderboard And Prizes <span>Myrtle 2026</span></h1>
          <div class="note">Read-only Ryder Cup standings, side-game winners, and team score rankings.</div>
        </div>
        <div class="hero-links">
          <a class="hero-link" data-trip-page-link href="/myrtle/trip-2026.html">Trip Page</a>
          <a class="hero-link" data-report-link href="/myrtle/prize-report.html">Prize Report</a>
          <a class="hero-link" data-all-foursomes-link href="/myrtle/all-foursomes.html">All Foursomes</a>
          <a class="hero-link" data-lodging-link href="/myrtle/lodging-and-maps.html">Lodging + Maps</a>
        </div>
      </div>
    </header>
    <main id="pageBody" class="panel">
      <div class="empty">Loading Myrtle Ryder Cup standings...</div>
    </main>
  </div>
  <script>
    const MYRTLE_PRIMARY_TRIP_NAME = 'Myrtle Beach - Barefoot Group 3/18-3/22/26';
    const MYRTLE_ARRIVAL_DATE = '2026-03-18';
    let tripId = '';
    let competitionData = null;
    let loadError = '';
    const tripApi = (path) => (path.includes('?') ? `${path}&myrtleBeach2026=true` : `${path}?myrtleBeach2026=true`);
    const getRequestedTripId = () => { try { return String(new URLSearchParams(window.location.search).get('tripId') || '').trim(); } catch (_error) { return ''; } };
    const buildPageHref = (path = '') => { const currentTripId = String(tripId || getRequestedTripId() || '').trim(); return currentTripId ? `${path}${path.includes('?') ? '&' : '?'}tripId=${encodeURIComponent(currentTripId)}` : path; };
    const syncLinks = () => {
      document.querySelectorAll('[data-trip-page-link]').forEach((link) => { link.href = buildPageHref('/myrtle/trip-2026.html'); });
      document.querySelectorAll('[data-report-link]').forEach((link) => { link.href = buildPageHref('/myrtle/prize-report.html'); });
      document.querySelectorAll('[data-all-foursomes-link]').forEach((link) => { link.href = buildPageHref('/myrtle/all-foursomes.html'); });
      document.querySelectorAll('[data-lodging-link]').forEach((link) => { link.href = buildPageHref('/myrtle/lodging-and-maps.html'); });
    };
    const getIsoDateOnly = (value) => { if (!value) return ''; const parsed = value instanceof Date ? new Date(value.getTime()) : new Date(value); return Number.isNaN(parsed.getTime()) ? '' : parsed.toISOString().slice(0, 10); };
    const isMyrtleTripCandidate = (entry = {}) => /myrtle/i.test(String(entry && entry.name || '').trim()) || /myrtle/i.test(String(entry && entry.location || '').trim());
    const findPreferredMyrtleTrip = (trips = []) => {
      const requestedTripId = getRequestedTripId();
      const list = Array.isArray(trips) ? trips : [];
      if (requestedTripId) {
        const requested = list.find((entry) => String(entry && entry._id || '').trim() === requestedTripId);
        if (requested) return requested;
      }
      return list.find((entry) => String(entry && entry.name || '').trim() === MYRTLE_PRIMARY_TRIP_NAME)
        || list.find((entry) => isMyrtleTripCandidate(entry) && getIsoDateOnly(entry && entry.arrivalDate) === MYRTLE_ARRIVAL_DATE)
        || list.find((entry) => isMyrtleTripCandidate(entry))
        || null;
    };
    async function tripFetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const contentType = response.headers.get('content-type') || '';
      const payload = contentType.includes('application/json') ? await response.json() : await response.text();
      if (!response.ok) {
        const message = payload && typeof payload === 'object' ? (payload.error || payload.message) : String(payload || 'Request failed');
        throw new Error(message || 'Request failed');
      }
      return payload;
    }
    const escapeHtml = (value) => String(value == null ? '' : value).replace(/[&<>"]/g, (char) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[char]));
    const normalizeNameKey = (value) => String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    const formatCurrency = (value) => { const num = Number(value); return Number.isFinite(num) ? num.toLocaleString(undefined, { style:'currency', currency:'USD' }) : '—'; };
    const formatCompetitionPoints = (value) => { const num = Number(value); if (!Number.isFinite(num)) return '0'; return Number.isInteger(num) ? String(num) : num.toFixed(1).replace(/\.0$/, ''); };
    const formatWinnerList = (values = []) => Array.isArray(values) && values.length ? values.join(', ') : '';
    const formatBirdiePoolDetail = (entry = {}, pendingLabel = 'Pending') => {
      const totalBirdies = Math.max(0, Math.round(Number(entry && entry.totalBirdies) || 0));
      if (!totalBirdies) return pendingLabel;
      const perBirdieAmount = Number(entry && entry.perBirdieAmount);
      return Number.isFinite(perBirdieAmount)
        ? `${totalBirdies} ${totalBirdies === 1 ? 'birdie' : 'birdies'} @ ${formatCurrency(perBirdieAmount)} per birdie`
        : `${totalBirdies} ${totalBirdies === 1 ? 'birdie' : 'birdies'}`;
    };
    function buildRyderCupScoreRankingState(ryderCup = {}) {
      const teams = Array.isArray(ryderCup.teams) ? ryderCup.teams : [];
      const rounds = Array.isArray(ryderCup.rounds) ? ryderCup.rounds : [];
      const metaByName = new Map();
      teams.forEach((team) => (team.players || []).forEach((player) => {
        const name = String(player && player.name || '').trim();
        const key = normalizeNameKey(name);
        if (!key) return;
        metaByName.set(key, { name, teamId: team.id, teamName: team.name || 'Team', matchHandicap: Number.isFinite(Number(player && player.matchHandicap)) ? Math.round(Number(player.matchHandicap)) : 0 });
      }));
      const rankRows = (rows = [], scoreKey = 'net') => {
        const sorted = rows.slice().sort((left, right) => {
          const leftScore = Number.isFinite(Number(left && left[scoreKey])) ? Number(left[scoreKey]) : Number.POSITIVE_INFINITY;
          const rightScore = Number.isFinite(Number(right && right[scoreKey])) ? Number(right[scoreKey]) : Number.POSITIVE_INFINITY;
          if (leftScore !== rightScore) return leftScore - rightScore;
          const leftGross = Number.isFinite(Number(left && (left.grossTotal ?? left.gross))) ? Number(left.grossTotal ?? left.gross) : Number.POSITIVE_INFINITY;
          const rightGross = Number.isFinite(Number(right && (right.grossTotal ?? right.gross))) ? Number(right.grossTotal ?? right.gross) : Number.POSITIVE_INFINITY;
          if (leftGross !== rightGross) return leftGross - rightGross;
          return String(left && left.name || '').localeCompare(String(right && right.name || ''));
        });
        let previousScore = null;
        let previousPosition = 0;
        return sorted.map((row, index) => {
          const scoreValue = Number.isFinite(Number(row && row[scoreKey])) ? Number(row[scoreKey]) : null;
          const position = previousScore !== null && scoreValue === previousScore ? previousPosition : index + 1;
          previousScore = scoreValue;
          previousPosition = position;
          return { ...row, position };
        });
      };
      const daily = rounds.map((round, roundIndex) => {
        const rows = [];
        const pushRow = (playerName = '', grossScore = null) => {
          const gross = Number(grossScore);
          if (!Number.isFinite(gross)) return;
          const meta = metaByName.get(normalizeNameKey(playerName));
          if (!meta) return;
          rows.push({ name: meta.name, teamId: meta.teamId, teamName: meta.teamName, gross, net: gross - meta.matchHandicap, matchHandicap: meta.matchHandicap });
        };
        (round.matches || []).forEach((match) => {
          (match.teamAPlayers || []).forEach((name, index) => pushRow(name, match.teamAPlayerScores && match.teamAPlayerScores[index]));
          (match.teamBPlayers || []).forEach((name, index) => pushRow(name, match.teamBPlayerScores && match.teamBPlayerScores[index]));
        });
        const teamsView = teams.map((team, teamIndex) => ({ teamId: team.id, teamName: team.name || 'Team', rows: rankRows(rows.filter((row) => row.teamId === team.id), 'net'), expectedCount: ((teams[teamIndex] && teams[teamIndex].players) || []).length }));
        return { roundNumber: Number(round && round.roundNumber) || (roundIndex + 1), label: String((round && (round.label || round.title)) || `Round ${roundIndex + 1}`).trim(), hasScores: rows.length > 0, complete: teamsView.every((teamView) => teamView.rows.length === teamView.expectedCount), teams: teamsView.map(({ expectedCount, ...teamView }) => teamView) };
      }).filter((round) => round.hasScores);
      const totalsByName = new Map();
      daily.filter((round) => round.complete).forEach((round) => (round.teams || []).forEach((teamView) => (teamView.rows || []).forEach((row) => {
        const key = normalizeNameKey(row.name);
        if (!key) return;
        const existing = totalsByName.get(key) || { name: row.name, teamId: row.teamId, teamName: row.teamName, grossTotal: 0, netTotal: 0, roundsScored: 0 };
        existing.grossTotal += Number(row.gross) || 0;
        existing.netTotal += Number(row.net) || 0;
        existing.roundsScored += 1;
        totalsByName.set(key, existing);
      })));
      return {
        daily,
        overall: {
          completedRoundsCount: daily.filter((round) => round.complete).length,
          teams: teams.map((team) => ({ teamId: team.id, teamName: team.name || 'Team', rows: rankRows(Array.from(totalsByName.values()).filter((row) => row.teamId === team.id).map((row) => ({ ...row, averageNet: row.roundsScored ? Math.round((row.netTotal / row.roundsScored) * 10) / 10 : null })), 'netTotal') })),
        },
      };
    }
    function buildRyderCupPrizeSummaryRows(ryderCup = {}) {
      const sideGames = ryderCup.sideGames || {};
      const payoutRows = Array.isArray(ryderCup.payout && ryderCup.payout.rows) ? ryderCup.payout.rows : [];
      const standings = ryderCup.standings || {};
      const getPayoutRow = (key = '') => payoutRows.find((row) => row && row.key === key) || {};
      const getLatestWinnerEntry = (entries = []) => { const list = Array.isArray(entries) ? entries : []; for (let index = list.length - 1; index >= 0; index -= 1) { const entry = list[index] || {}; if (Array.isArray(entry.winnerNames) && entry.winnerNames.length) return entry; } return null; };
      const rows = [];
      const pushRow = (label = '', key = '', detail = 'Pending') => { const amount = Number(getPayoutRow(key).amount || 0); if (amount > 0) rows.push({ label, amount, detail: String(detail || 'Pending').trim() || 'Pending' }); };
      pushRow('Winning Team', 'winningTeam', (standings.remainingPoints || 0) > 0 ? `${standings.leaderTeamName || 'Tied'} leads` : (getPayoutRow('winningTeam').winnerLabel || 'Pending Ryder Cup result'));
      const latestDailyNet = getLatestWinnerEntry(sideGames.dailyNet);
      const latestDailyOver100 = getLatestWinnerEntry(sideGames.dailyOver100Draw);
      const latestDailyBirdie = getLatestWinnerEntry(sideGames.dailyBirdiePot);
      const latestLongestPutt = getLatestWinnerEntry(sideGames.dailyLongestPuttLastHole);
      pushRow('Daily Net', 'dailyNet', latestDailyNet ? `${latestDailyNet.label}: ${formatWinnerList(latestDailyNet.winnerNames)}` : 'Pending');
      pushRow('Daily Over-100 Draw', 'dailyOver100Draw', latestDailyOver100 ? `${latestDailyOver100.label}: ${formatWinnerList(latestDailyOver100.winnerNames)}` : 'Pending');
      pushRow('Daily Birdie Pot', 'dailyBirdiePot', latestDailyBirdie ? `${latestDailyBirdie.label}: ${formatBirdiePoolDetail(latestDailyBirdie, 'Pending')}` : 'Pending');
      pushRow('Longest Made Putt', 'dailyLongestPuttLastHole', latestLongestPutt ? `${latestLongestPutt.label}: ${formatWinnerList(latestLongestPutt.winnerNames)}` : 'Pending');
      pushRow('Weekly Net Champion', 'weeklyNet', formatWinnerList(sideGames.weeklyNet && sideGames.weeklyNet.winnerNames) || 'Pending');
      pushRow('Weekly Over-100 Draw', 'weeklyOver100Draw', formatWinnerList(sideGames.weeklyOver100Draw && sideGames.weeklyOver100Draw.winnerNames) || 'Pending');
      pushRow('Closest To Pin', 'closestToPin', formatWinnerList(sideGames.closestToPin && sideGames.closestToPin.winners) || 'Pending');
      pushRow('Trip Birdie Pool', 'birdiePool', formatBirdiePoolDetail(sideGames.birdiePool, 'Pending'));
      pushRow('Ryder Cup MVP', 'mvp', formatWinnerList(sideGames.mvp && sideGames.mvp.winners) || 'Pending');
      return rows;
    }
    function buildRyderCupPrizeMoneySections(ryderCup = {}) {
      const sideGames = ryderCup.sideGames || {};
      const payout = ryderCup.payout || {};
      const teams = Array.isArray(ryderCup.teams) ? ryderCup.teams : [];
      const payoutRows = Array.isArray(payout.rows) ? payout.rows : [];
      const getPayoutRow = (key = '') => payoutRows.find((row) => row && row.key === key) || {};
      const buildEntryBreakdown = (entries = [], fallback = 'Configured payouts') => { const amounts = (Array.isArray(entries) ? entries : []).map((entry) => Number(entry && entry.amount || 0)).filter((amount) => amount > 0); if (!amounts.length) return fallback; const unique = Array.from(new Set(amounts.map((amount) => amount.toFixed(2)))); return unique.length === 1 ? `${amounts.length} x ${formatCurrency(amounts[0])}` : amounts.map((amount) => formatCurrency(amount)).join(' + '); };
      const buildSingleBreakdown = (row = {}, fallbackCount = 1) => {
        const winners = Array.isArray(row.winners) ? row.winners.filter(Boolean) : [];
        const shareRows = Array.isArray(row.shareRows) ? row.shareRows.filter((entry) => Number(entry && entry.amount || 0) > 0) : [];
        const perPerson = Number(row.perPerson || 0);
        const amount = Number(row.amount || 0);
        if (shareRows.length) {
          const totalBirdies = shareRows.reduce((sum, entry) => sum + Math.max(0, Math.round(Number(entry && entry.birdies) || 0)), 0);
          if (totalBirdies > 0) return `${totalBirdies} birdies paid from ${formatCurrency(amount)}`;
        }
        if (winners.length && perPerson > 0 && Math.abs((perPerson / 5) - Math.round(perPerson / 5)) < 0.001) return `${winners.length} x ${formatCurrency(perPerson)} each`;
        if (winners.length && amount > 0) return `${winners.length} winners split ${formatCurrency(amount)} in $5 chunks`;
        if (amount > 0) return `${fallbackCount} x ${formatCurrency(amount)}`;
        return 'Pending';
      };
      const buildBirdieEntryBreakdown = (entries = [], fallback = 'Round-by-round payout') => {
        const list = (Array.isArray(entries) ? entries : []).filter((entry) => Number(entry && entry.amount || 0) > 0);
        if (!list.length) return fallback;
        const unique = Array.from(new Set(list.map((entry) => Number(entry.amount || 0).toFixed(2))));
        const baseLabel = unique.length === 1
          ? `${list.length} x ${formatCurrency(Number(list[0].amount || 0))} pools`
          : list.map((entry) => formatCurrency(Number(entry.amount || 0))).join(' + ');
        return `${baseLabel}, paid by birdie count`;
      };
      const buildTripBirdieBreakdown = (entry = {}, row = {}) => {
        const amount = Number(row.amount || entry.amount || 0);
        const totalBirdies = Math.max(0, Math.round(Number(entry && entry.totalBirdies) || 0));
        if (!amount) return 'Pending';
        if (!totalBirdies) return `1 x ${formatCurrency(amount)}`;
        return `${totalBirdies} birdies paid from ${formatCurrency(amount)}`;
      };
      const sections = [];
      const pushRow = (title, key, label, breakdown) => {
        const row = getPayoutRow(key);
        const amount = Number(row.amount || 0);
        if (amount <= 0) return;
        let section = sections.find((entry) => entry.title === title);
        if (!section) { section = { title, rows: [] }; sections.push(section); }
        section.rows.push({ label, amount, breakdown: String(breakdown || '').trim() || 'Configured payout' });
      };
      const winningTeamRow = getPayoutRow('winningTeam');
      const defaultTeamCount = Math.max(Array.isArray(teams[0] && teams[0].players) ? teams[0].players.length : 0, Array.isArray(teams[1] && teams[1].players) ? teams[1].players.length : 0, 10);
      const pendingTeamShare = defaultTeamCount > 0 ? Number(payout.teamAmount || 0) / defaultTeamCount : 0;
      pushRow('Team Result', 'winningTeam', 'Winning Team', Number(winningTeamRow.perPerson || 0) > 0 ? buildSingleBreakdown(winningTeamRow) : (pendingTeamShare > 0 ? `${defaultTeamCount} x ${formatCurrency(pendingTeamShare)} if they win` : 'Pending Ryder Cup finish'));
      pushRow('Daily Pots', 'dailyNet', 'Daily Net', buildEntryBreakdown(sideGames.dailyNet, 'Round-by-round payout'));
      pushRow('Daily Pots', 'dailyOver100Draw', 'Daily Over-100 Draw', buildEntryBreakdown(sideGames.dailyOver100Draw, 'Round-by-round payout'));
      pushRow('Daily Pots', 'dailyBirdiePot', 'Daily Birdie Pot', buildBirdieEntryBreakdown(sideGames.dailyBirdiePot, 'Round-by-round payout'));
      pushRow('Daily Pots', 'dailyLongestPuttLastHole', 'Last-Hole Putt', buildEntryBreakdown(sideGames.dailyLongestPuttLastHole, 'Round-by-round payout'));
      pushRow('Trip-Long Pots', 'weeklyNet', 'Weekly Net Champion', buildSingleBreakdown(getPayoutRow('weeklyNet')));
      pushRow('Trip-Long Pots', 'weeklyOver100Draw', 'Weekly Over-100 Draw', buildSingleBreakdown(getPayoutRow('weeklyOver100Draw')));
      pushRow('Trip-Long Pots', 'closestToPin', 'Closest To Pin', buildSingleBreakdown(getPayoutRow('closestToPin')));
      pushRow('Trip-Long Pots', 'birdiePool', 'Trip Birdie Pool', buildTripBirdieBreakdown(sideGames.birdiePool, getPayoutRow('birdiePool')));
      pushRow('Trip-Long Pots', 'mvp', 'Ryder Cup MVP', buildSingleBreakdown(getPayoutRow('mvp')));
      return sections;
    }
    const renderTeamRankingCard = (teamView = {}, mode = 'daily', emptyText = 'No scores yet.') => {
      const rows = Array.isArray(teamView.rows) ? teamView.rows : [];
      return `<div class="card"><div class="card-head"><strong>${escapeHtml(teamView.teamName || 'Team')}</strong><span class="note">${escapeHtml(rows.length ? `${rows.length} scored` : emptyText)}</span></div>${rows.length ? `<ol class="rank-list">${rows.map((row) => `<li><span><strong>#${escapeHtml(String(row.position || '—'))} ${escapeHtml(row.name || 'Player')}</strong><br><span class="note">${mode === 'overall' ? `${escapeHtml(String(row.roundsScored || 0))} rounds · Gross ${escapeHtml(String(row.grossTotal || 0))}` : `Gross ${escapeHtml(String(row.gross || 0))} · Hcp ${escapeHtml(String(row.matchHandicap || 0))}`}</span></span><span>Net ${escapeHtml(String(mode === 'overall' ? (row.netTotal || 0) : (row.net || 0)))}${mode === 'overall' && row.averageNet !== null && row.averageNet !== undefined ? `<br><span class="note">Avg ${escapeHtml(String(row.averageNet))}</span>` : ''}</span></li>`).join('')}</ol>` : `<div class="empty">${escapeHtml(emptyText)}</div>`}</div>`;
    };
    function renderPage() {
      syncLinks();
      const pageBody = document.getElementById('pageBody');
      const ryderCup = competitionData && competitionData.ryderCup ? competitionData.ryderCup : null;
      if (!ryderCup) {
        pageBody.innerHTML = `<div class="empty">${escapeHtml(loadError || 'Myrtle Ryder Cup standings are not available yet.')}</div>`;
        return;
      }
      const teamA = ryderCup.teams && ryderCup.teams[0] ? ryderCup.teams[0] : { name:'Team A' };
      const teamB = ryderCup.teams && ryderCup.teams[1] ? ryderCup.teams[1] : { name:'Team B' };
      const standings = ryderCup.standings || {};
      const payout = ryderCup.payout || {};
      const rankings = buildRyderCupScoreRankingState(ryderCup);
      const prizeRows = buildRyderCupPrizeSummaryRows(ryderCup);
      const prizeSections = buildRyderCupPrizeMoneySections(ryderCup);
      const leaders = Array.isArray(ryderCup.individualLeaderboard) ? ryderCup.individualLeaderboard.slice(0, 8) : [];
      pageBody.innerHTML = `
        <div class="section-head">
          <div class="section-copy">
            <h2 class="section-title">Ryder Cup Standings</h2>
            <div class="note">${escapeHtml(standings.status || 'Standings will update as round scores are saved.')}</div>
          </div>
          <div class="pill-row">
            <span class="pill">${escapeHtml(formatCurrency(payout.totalPot || 0))} total pot</span>
            <span class="pill">${escapeHtml(formatCurrency(payout.nonTeamAmount || 0))} side games</span>
            <span class="pill">${escapeHtml(formatCurrency(payout.teamAmount || 0))} team share</span>
            ${Number(payout.overAllocatedAmount || 0) > 0 ? `<span class="pill">${escapeHtml(formatCurrency(payout.overAllocatedAmount || 0))} over</span>` : ''}
          </div>
        </div>
        <div class="scoreboard" style="margin-top:12px;">
          <div class="score-box"><strong>${escapeHtml(teamA.name || 'Team A')}</strong><div class="score-value">${escapeHtml(formatCompetitionPoints(standings.teamAPoints || 0))}</div><div class="note">${escapeHtml((teamA.players || []).length)} golfers</div></div>
          <div class="score-box"><strong>${escapeHtml(teamB.name || 'Team B')}</strong><div class="score-value">${escapeHtml(formatCompetitionPoints(standings.teamBPoints || 0))}</div><div class="note">${escapeHtml((teamB.players || []).length)} golfers</div></div>
          <div class="score-box"><strong>Match Status</strong><div class="score-value" style="font-size:1.15rem;">${escapeHtml(standings.leaderTeamName || 'Tied')}</div><div class="note">${escapeHtml(`${formatCompetitionPoints(standings.remainingPoints || 0)} points left`)}</div></div>
        </div>
        <div class="grid-2" style="margin-top:14px;">
          <div class="card"><strong>Prize Money</strong><div class="note" style="margin-top:4px;">How the pot is divided right now.</div><div class="stack-grid" style="margin-top:12px;">${prizeSections.map((section) => `<div><div class="prize-section-title">${escapeHtml(section.title || 'Prize Section')}</div>${(section.rows || []).map((row) => `<div class="prize-row"><div><strong>${escapeHtml(row.label || 'Prize')}</strong><div class="note">${escapeHtml(row.breakdown || 'Configured payout')}</div></div><div class="amount">${escapeHtml(formatCurrency(row.amount || 0))}</div></div>`).join('')}</div>`).join('') || `<div class="empty">Prize rows are not configured yet.</div>`}</div></div>
          <div class="card"><strong>Current Winners</strong><div class="note" style="margin-top:4px;">Latest daily payouts and current trip-long leaders.</div>${prizeRows.length ? `<ul class="list" style="margin-top:12px;">${prizeRows.map((row) => `<li><span><strong>${escapeHtml(row.label || 'Prize')}</strong><br><span class="note">${escapeHtml(row.detail || 'Pending')}</span></span><span class="amount">${escapeHtml(formatCurrency(row.amount || 0))}</span></li>`).join('')}</ul>` : `<div class="empty" style="margin-top:12px;">Current winners will show here after prizes are saved.</div>`}</div>
        </div>
        ${leaders.length ? `<div class="panel" style="margin-top:14px; padding:12px;"><strong>Match Points Leaders</strong><ul class="list" style="margin-top:10px;">${leaders.map((entry) => `<li><span><strong>#${escapeHtml(String(entry.position || '—'))} ${escapeHtml(entry.name || 'Player')}</strong><br><span class="note">${escapeHtml(entry.teamName || 'No team')} · ${escapeHtml(entry.record || '0-0-0')}</span></span><span class="amount">${escapeHtml(formatCompetitionPoints(entry.pointsWon || 0))} pts</span></li>`).join('')}</ul></div>` : ''}
        <div class="panel" style="margin-top:14px;">
          <strong>Overall Net Rankings</strong>
          <div class="note" style="margin-top:4px;">${escapeHtml(rankings.overall.completedRoundsCount ? `${rankings.overall.completedRoundsCount} completed round${rankings.overall.completedRoundsCount === 1 ? '' : 's'} counted.` : 'Complete a full round to rank both teams.')}</div>
          <div class="grid-2" style="margin-top:12px;">${(rankings.overall.teams || []).map((teamView) => renderTeamRankingCard(teamView, 'overall', 'No completed round totals yet.')).join('')}</div>
        </div>
        <div class="panel" style="margin-top:14px;">
          <strong>Daily Net Rankings</strong>
          <div class="note" style="margin-top:4px;">Lower net is better inside each team for each scored round.</div>
          ${rankings.daily.length ? `<div class="round-grid" style="margin-top:12px;">${rankings.daily.map((round) => `<div class="card"><div class="card-head"><strong>${escapeHtml(round.label || `Round ${round.roundNumber}`)}</strong><span class="pill">${escapeHtml(round.complete ? 'Complete' : 'Incomplete')}</span></div><div class="grid-2" style="margin-top:10px;">${(round.teams || []).map((teamView) => renderTeamRankingCard(teamView, 'daily', 'No team scores yet.')).join('')}</div></div>`).join('')}</div>` : `<div class="empty" style="margin-top:12px;">Enter round scores to build the daily team rankings.</div>`}
        </div>
      `;
    }
    async function loadPage() {
      syncLinks();
      loadError = '';
      try {
        const trips = await tripFetchJson(tripApi('/api/trips'));
        const trip = findPreferredMyrtleTrip(trips);
        if (!trip) throw new Error(getRequestedTripId() ? 'Requested Myrtle trip not found.' : 'Myrtle trip not found.');
        tripId = trip._id;
        syncLinks();
        competitionData = await tripFetchJson(tripApi(`/api/trips/${tripId}/competition`));
      } catch (error) {
        loadError = error && error.message ? error.message : 'Failed to load Myrtle standings.';
      }
      renderPage();
    }
    loadPage();
  </script>
</body>
</html>
