<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Myrtle All Foursomes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --bg: #0d1726;
      --panel: #0f2138;
      --panel-soft: #132a45;
      --accent: #e0b457;
      --accent-2: #6dd3ff;
      --ink: #e6edf7;
      --ink-soft: #9fb6d4;
      --muted: #6b82a3;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(109,211,255,0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(224,180,87,0.10), transparent 30%),
                  #0b1422;
      margin: 0;
      color: var(--ink);
      min-height: 100vh;
    }
    .container {
      max-width: 1100px;
      margin: 14px auto 28px;
      padding: 0 16px;
    }
    .hero {
      background: linear-gradient(135deg, #0f2138 0%, #0b1626 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
    }
    .hero-top,
    .page-section-head,
    .all-foursomes-round-head,
    .all-foursomes-slot-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }
    .hero-copy,
    .page-section-copy {
      display: grid;
      gap: 4px;
      min-width: 0;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.4rem, 4vw, 2rem);
      display: flex;
      align-items: baseline;
      gap: 10px;
      letter-spacing: 0.4px;
    }
    h1 span {
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .chips,
    .hero-actions,
    .page-section-actions,
    .competition-pill-row,
    .all-foursomes-repeat-pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chips {
      margin-top: 10px;
    }
    .chip,
    .competition-pill,
    .all-foursomes-repeat-pill {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--ink-soft);
      font-size: 0.8rem;
    }
    .competition-pill {
      border-color: rgba(109,211,255,0.25);
      background: rgba(109,211,255,0.10);
      color: #d7f0ff;
      font-weight: 700;
    }
    .all-foursomes-repeat-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-color: rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: #ffd9d2;
    }
    .all-foursomes-repeat-pill strong {
      color: #fff;
      font-size: 0.74rem;
    }
    .all-foursomes-repeat-card.is-heavy,
    .all-foursomes-repeat-pill.is-heavy {
      border-color: rgba(255,156,143,0.42);
      background: rgba(127,36,36,0.18);
    }
    .hero-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(109,211,255,0.24);
      background: rgba(109,211,255,0.08);
      color: #d7f0ff;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }
    .hero-link:hover {
      background: rgba(109,211,255,0.16);
      text-decoration: none;
    }
    .panel,
    .competition-admin-card,
    .all-foursomes-repeat-card,
    .all-foursomes-round-card,
    .all-foursomes-slot-card {
      background: linear-gradient(145deg, var(--panel) 0%, #0c1a2c 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .panel {
      padding: 14px;
      margin-top: 12px;
    }
    .competition-admin-card,
    .all-foursomes-repeat-card,
    .all-foursomes-round-card {
      padding: 10px;
      display: grid;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      box-shadow: none;
    }
    .all-foursomes-slot-card {
      padding: 9px;
      display: grid;
      gap: 8px;
      background: rgba(11,23,40,0.4);
      box-shadow: none;
    }
    .competition-note,
    .all-foursomes-repeat-list {
      color: var(--ink-soft);
      font-size: 0.82rem;
      line-height: 1.45;
    }
    .competition-empty {
      color: var(--ink-soft);
      font-size: 0.85rem;
    }
    .competition-section {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
    }
    .competition-section summary {
      list-style: none;
      cursor: pointer;
      padding: 11px 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: #fff;
    }
    .competition-section summary::-webkit-details-marker {
      display: none;
    }
    .competition-section summary::after {
      content: "▾";
      color: var(--accent-2);
      font-size: 0.95rem;
    }
    .competition-section[open] summary {
      border-bottom: 1px solid var(--border);
    }
    .competition-section[open] summary::after {
      content: "▴";
    }
    .competition-section-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .all-foursomes-section,
    .all-foursomes-repeat-grid,
    .all-foursomes-round-grid,
    .all-foursomes-slot-list {
      display: grid;
      gap: 10px;
    }
    .all-foursomes-repeat-grid {
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    .all-foursomes-repeat-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 4px;
    }
    .floating-link {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 8px 12px;
      border-radius: 10px;
      background: #0c1a2c;
      color: #f9fafb;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      z-index: 999;
    }
    @media (max-width: 900px) {
      .hero { position: static; }
    }
    @media (max-width: 640px) {
      .container {
        margin: 10px auto 22px;
        padding: 0 10px;
      }
      .hero,
      .panel {
        border-radius: 14px;
        padding: 12px;
      }
      .hero-link {
        min-height: 30px;
        padding: 6px 9px;
        font-size: 0.76rem;
      }
      .competition-section summary {
        padding: 10px 12px;
      }
      .competition-section-body {
        padding: 10px;
        gap: 8px;
      }
      .floating-link {
        padding: 6px 10px;
        border-radius: 9px;
        font-size: 0.76rem;
      }
    }
  </style>
</head>
<body>
  <a class="floating-link" data-trip-page-link href="/myrtle/trip-2026.html">← Myrtle Trip</a>
  <div class="container">
    <header class="hero">
      <div class="hero-top">
        <div class="hero-copy">
          <h1>All Foursomes <span>Myrtle 3/18-3/22/26</span></h1>
          <div class="chips">
            <div class="chip">Myrtle Beach, SC</div>
            <div class="chip">Week pairing view</div>
            <div class="chip">Repeat pair scan</div>
          </div>
        </div>
        <div class="hero-actions">
          <a class="hero-link" data-trip-page-link href="/myrtle/trip-2026.html">Trip Page</a>
          <a class="hero-link" data-leaderboard-link href="/myrtle/leaderboard-and-prizes.html">Ryder Cup Standings</a>
          <a class="hero-link" data-report-link href="/myrtle/prize-report.html">Prize Report</a>
          <a class="hero-link" data-lodging-link href="/myrtle/lodging-and-maps.html">Lodging + Maps</a>
        </div>
      </div>
    </header>
    <section class="panel" id="allFoursomesBox">
      <div class="competition-empty">Loading Myrtle foursomes...</div>
    </section>
  </div>
  <script>
    const MYRTLE_ARRIVAL_DATE = '2026-03-18';
    const MYRTLE_PRIMARY_TRIP_NAME = 'Myrtle Beach - Barefoot Group 3/18-3/22/26';
    const NAME_ALIASES = {
      jayquimby: ['johnquimby'],
      johnquimby: ['jayquimby'],
      mannyordonez: ['manuelordonez'],
      manuelordonez: ['mannyordonez'],
      tomlasik: ['thomaslasik'],
      thomaslasik: ['tomlasik'],
      lancedar: ['lancedarr'],
      lancedarr: ['lancedar'],
      tommyknight: ['tommyknightjr'],
      tommyknightjr: ['tommyknight']
    };
    const parseTimeMinutes = (value) => {
      const match = /^(\d{1,2}):(\d{2})$/.exec(String(value || '').trim());
      if (!match) return null;
      const hh = Number(match[1]);
      const mm = Number(match[2]);
      if (!Number.isInteger(hh) || !Number.isInteger(mm) || hh < 0 || hh > 23 || mm < 0 || mm > 59) return null;
      return (hh * 60) + mm;
    };
    const minutesToHHMM = (totalMinutes) => {
      if (!Number.isFinite(totalMinutes)) return '';
      const inDay = ((Math.round(totalMinutes) % 1440) + 1440) % 1440;
      const hh = String(Math.floor(inDay / 60)).padStart(2, '0');
      const mm = String(inDay % 60).padStart(2, '0');
      return `${hh}:${mm}`;
    };
    const buildTripSlots = (firstTime, groups = []) => {
      const startMinutes = parseTimeMinutes(firstTime);
      return groups.map((players, index) => {
        const slotMinutes = startMinutes === null ? null : startMinutes + (index * 9);
        return {
          label: `TT#${index + 1}`,
          time: slotMinutes === null ? '' : minutesToHHMM(slotMinutes),
          players: Array.isArray(players) ? players.map((name) => String(name || '').trim()).filter(Boolean) : []
        };
      });
    };
    const DEFAULT_ROUNDS = [
      {
        course: 'World Tour',
        date: '2026-03-18',
        time: '13:17',
        teeTimes: buildTripSlots('13:17', [
          ['Chris Manuel', 'Tommy Knight Sr', 'Caleb Hart', 'Matt Shannon'],
          ['Delmar Christian', 'Jeremy Bridges', 'Marcus Ordonez', 'Manuel Ordonez'],
          ['Dennis Freeman', 'Thomas Lasik', 'Chris Neff', 'John Hyers'],
          ['Duane Harris', 'John Quimby', 'Chad Jones', 'Lance Darr'],
          ['Joe Gillette', 'Tommy Knight', 'Josh Browne', 'Reny Butler']
        ])
      },
      {
        course: 'Wild Wing Avocet',
        date: '2026-03-19',
        time: '09:09',
        teeTimes: buildTripSlots('09:09', [
          ['Chris Manuel', 'Duane Harris', 'Lance Darr', 'Manuel Ordonez'],
          ['Delmar Christian', 'Thomas Lasik', 'Chad Jones', 'John Hyers'],
          ['Dennis Freeman', 'John Quimby', 'Marcus Ordonez', 'Reny Butler'],
          ['Jeremy Bridges', 'Joe Gillette', 'Caleb Hart', 'Josh Browne'],
          ['Tommy Knight', 'Tommy Knight Sr', 'Chris Neff', 'Matt Shannon']
        ])
      },
      {
        course: "King's North",
        date: '2026-03-20',
        time: '08:26',
        teeTimes: buildTripSlots('08:26', [
          ['Tommy Knight', 'Jeremy Bridges', 'Joe Gillette', 'Chris Manuel'],
          ['Delmar Christian', 'Lance Darr', 'Matt Shannon', 'Reny Butler'],
          ['Dennis Freeman', 'Duane Harris', 'Chad Jones', 'Manuel Ordonez'],
          ['Caleb Hart', 'John Quimby', 'Josh Browne', 'John Hyers'],
          ['Thomas Lasik', 'Tommy Knight Sr', 'Chris Neff', 'Marcus Ordonez']
        ])
      },
      {
        course: 'River Hills',
        date: '2026-03-21',
        time: '09:15',
        teeTimes: buildTripSlots('09:15', [
          ['Jeremy Bridges', 'Duane Harris', 'Caleb Hart', 'Chris Neff'],
          ['Tommy Knight', 'Dennis Freeman', 'Matt Shannon', 'John Hyers'],
          ['John Quimby', 'Delmar Christian', 'Marcus Ordonez', 'Chad Jones'],
          ['Thomas Lasik', 'Josh Browne', 'Reny Butler', 'Chris Manuel'],
          ['Joe Gillette', 'Tommy Knight Sr', 'Lance Darr', 'Manuel Ordonez']
        ])
      },
      {
        course: 'Long Bay',
        date: '2026-03-22',
        time: '08:00',
        teeTimes: buildTripSlots('08:00', [
          ['Tommy Knight', 'Marcus Ordonez', 'Tommy Knight Sr', 'Manuel Ordonez'],
          ['Thomas Lasik', 'Joe Gillette', 'John Quimby', 'Reny Butler'],
          ['Jeremy Bridges', 'John Hyers', 'Chris Manuel', 'Lance Darr'],
          ['Dennis Freeman', 'Caleb Hart', 'Chad Jones', 'Matt Shannon'],
          ['Duane Harris', 'Josh Browne', 'Chris Neff', 'Delmar Christian']
        ])
      }
    ];
    let tripId = null;
    let trip = null;
    let competitionData = null;
    let loadError = '';

    const escapeHtml = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
    const quoteAttr = (value) => escapeHtml(String(value || '')).replace(/"/g, '&quot;');
    const normalizeNameKey = (value) => String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    const getAliasKeys = (value) => {
      const primaryKey = normalizeNameKey(value);
      if (!primaryKey) return [];
      const seen = new Set([primaryKey]);
      (NAME_ALIASES[primaryKey] || []).forEach((alias) => {
        const aliasKey = normalizeNameKey(alias);
        if (aliasKey) seen.add(aliasKey);
      });
      return Array.from(seen);
    };
    const getComparableNameKey = (value) => {
      const keys = getAliasKeys(value).sort();
      return keys[0] || '';
    };
    const toIsoDate = (value) => {
      if (!value) return '';
      if (typeof value === 'string') {
        const match = value.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (match) return `${match[1]}-${match[2]}-${match[3]}`;
      }
      const parsed = new Date(value);
      return Number.isNaN(parsed.getTime()) ? '' : parsed.toISOString().slice(0, 10);
    };
    const formatDateLong = (value) => {
      const iso = toIsoDate(value);
      if (!iso) return '';
      const [year, month, day] = iso.split('-').map(Number);
      const parsed = new Date(Date.UTC(year, month - 1, day));
      return Number.isNaN(parsed.getTime())
        ? iso
        : parsed.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' });
    };
    const formatTime12 = (value) => {
      const match = /^(\d{1,2}):(\d{2})$/.exec(String(value || '').trim());
      if (!match) return '';
      let hh = Number(match[1]);
      const mm = match[2];
      const suffix = hh >= 12 ? 'PM' : 'AM';
      hh = hh % 12 || 12;
      return `${hh}:${mm} ${suffix}`;
    };
    const sortRounds = (rounds = []) => {
      return rounds.slice().sort((left, right) => {
        const leftDate = toIsoDate(left && left.date) || '';
        const rightDate = toIsoDate(right && right.date) || '';
        if (leftDate && rightDate && leftDate !== rightDate) return leftDate.localeCompare(rightDate);
        const leftTime = String(left && left.time || '').trim();
        const rightTime = String(right && right.time || '').trim();
        if (leftTime && rightTime && leftTime !== rightTime) return leftTime.localeCompare(rightTime);
        return String(left && left.course || '').localeCompare(String(right && right.course || ''));
      });
    };
    const normalizeRoundSlot = (slot = {}, index = 0) => ({
      label: String(slot && slot.label || `TT#${index + 1}`).trim() || `TT#${index + 1}`,
      time: String(slot && slot.time || '').trim(),
      players: Array.isArray(slot && slot.players) ? slot.players.map((name) => String(name || '').trim()).filter(Boolean) : []
    });
    const normalizeRound = (raw = {}) => ({
      course: String(raw && raw.course || '').trim() || 'Course TBD',
      date: toIsoDate(raw && raw.date),
      time: String(raw && raw.time || '').trim(),
      teeTimes: Array.isArray(raw && raw.teeTimes) ? raw.teeTimes.map((slot, index) => normalizeRoundSlot(slot, index)).filter((slot) => slot.time || slot.players.length || slot.label) : [],
      unassignedPlayers: Array.isArray(raw && raw.unassignedPlayers) ? raw.unassignedPlayers.map((name) => String(name || '').trim()).filter(Boolean) : []
    });
    const tripApi = (path) => (path.includes('?') ? `${path}&myrtleBeach2026=true` : `${path}?myrtleBeach2026=true`);
    const getRequestedTripId = () => {
      try {
        return String(new URLSearchParams(window.location.search).get('tripId') || '').trim();
      } catch (_error) {
        return '';
      }
    };
    const buildPageHref = (path = '') => {
      const currentTripId = String(tripId || getRequestedTripId() || '').trim();
      if (!currentTripId) return path;
      return `${path}${path.includes('?') ? '&' : '?'}tripId=${encodeURIComponent(currentTripId)}`;
    };
    const getTripPageHref = () => buildPageHref('/myrtle/trip-2026.html');
    const getLeaderboardPageHref = () => buildPageHref('/myrtle/leaderboard-and-prizes.html');
    const getPrizeReportPageHref = () => buildPageHref('/myrtle/prize-report.html');
    const getLodgingPageHref = () => buildPageHref('/myrtle/lodging-and-maps.html');
    const syncTripLinks = () => {
      document.querySelectorAll('[data-trip-page-link]').forEach((link) => {
        link.href = getTripPageHref();
      });
      document.querySelectorAll('[data-leaderboard-link]').forEach((link) => {
        link.href = getLeaderboardPageHref();
      });
      document.querySelectorAll('[data-report-link]').forEach((link) => {
        link.href = getPrizeReportPageHref();
      });
      document.querySelectorAll('[data-lodging-link]').forEach((link) => {
        link.href = getLodgingPageHref();
      });
    };
    const getIsoDateOnly = (value) => {
      if (!value) return '';
      const parsed = value instanceof Date ? new Date(value.getTime()) : new Date(value);
      return Number.isNaN(parsed.getTime()) ? '' : parsed.toISOString().slice(0, 10);
    };
    const isMyrtleTripCandidate = (entry = {}) => {
      const name = String(entry && entry.name || '').trim();
      const location = String(entry && entry.location || '').trim();
      return /myrtle/i.test(name) || /myrtle/i.test(location);
    };
    const findPreferredMyrtleTrip = (trips = []) => {
      const requestedTripId = getRequestedTripId();
      const list = Array.isArray(trips) ? trips : [];
      if (requestedTripId) {
        const requested = list.find((entry) => String(entry && entry._id || '').trim() === requestedTripId);
        if (requested) return requested;
      }
      return list.find((entry) => String(entry && entry.name || '').trim() === MYRTLE_PRIMARY_TRIP_NAME)
        || list.find((entry) => isMyrtleTripCandidate(entry) && getIsoDateOnly(entry && entry.arrivalDate) === MYRTLE_ARRIVAL_DATE)
        || list.find((entry) => isMyrtleTripCandidate(entry))
        || null;
    };
    async function tripFetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const contentType = response.headers.get('content-type') || '';
      const payload = contentType.includes('application/json') ? await response.json() : await response.text();
      if (!response.ok) {
        const message = payload && typeof payload === 'object' ? (payload.error || payload.message) : String(payload || 'Request failed');
        throw new Error(message || 'Request failed');
      }
      return payload;
    }
    const getRyderCupData = () => competitionData && competitionData.ryderCup ? competitionData.ryderCup : null;
    const getRyderCupRoundMeta = (roundIndex) => {
      const rounds = Array.isArray(getRyderCupData() && getRyderCupData().rounds) ? getRyderCupData().rounds : [];
      return rounds[roundIndex] || null;
    };
    const getTripRounds = () => {
      const source = Array.isArray(trip && trip.rounds) && trip.rounds.length ? trip.rounds : DEFAULT_ROUNDS;
      return sortRounds(source.map(normalizeRound));
    };
    function buildTripFoursomeSummary(rounds = []) {
      const usableRounds = sortRounds((rounds || []).map(normalizeRound));
      const pairOccurrences = new Map();
      const playersByKey = new Map();
      const roundSummaries = usableRounds.map((round, roundIndex) => {
        const ryderRound = getRyderCupRoundMeta(roundIndex);
        const roundLabel = String((ryderRound && ryderRound.title) || round.course || `Round ${roundIndex + 1}`).trim() || `Round ${roundIndex + 1}`;
        (round.unassignedPlayers || []).forEach((name) => {
          const playerName = String(name || '').trim();
          const playerKey = getComparableNameKey(playerName) || normalizeNameKey(playerName);
          if (playerName && playerKey && !playersByKey.has(playerKey)) playersByKey.set(playerKey, playerName);
        });
        const slotSummaries = (round.teeTimes || []).map((slot, slotIndex) => {
          const uniquePlayers = [];
          const seenPlayers = new Set();
          (slot.players || []).forEach((name) => {
            const playerName = String(name || '').trim();
            if (!playerName) return;
            const playerKey = getComparableNameKey(playerName) || normalizeNameKey(playerName);
            if (!playerKey || seenPlayers.has(playerKey)) return;
            seenPlayers.add(playerKey);
            if (!playersByKey.has(playerKey)) playersByKey.set(playerKey, playerName);
            uniquePlayers.push({ key: playerKey, name: playerName });
          });
          const slotLabel = String(slot.label || `TT#${slotIndex + 1}`).trim() || `TT#${slotIndex + 1}`;
          const pairKeys = [];
          for (let leftIndex = 0; leftIndex < uniquePlayers.length; leftIndex += 1) {
            for (let rightIndex = leftIndex + 1; rightIndex < uniquePlayers.length; rightIndex += 1) {
              const pairPlayers = [uniquePlayers[leftIndex], uniquePlayers[rightIndex]]
                .sort((left, right) => left.name.localeCompare(right.name));
              const pairKey = pairPlayers.map((entry) => entry.key).join('::');
              if (!pairKey) continue;
              pairKeys.push(pairKey);
              const existing = pairOccurrences.get(pairKey) || {
                key: pairKey,
                players: pairPlayers.map((entry) => entry.name),
                locations: [],
              };
              existing.locations.push(`${round.course || roundLabel} - ${slotLabel}`);
              pairOccurrences.set(pairKey, existing);
            }
          }
          return {
            slotIndex,
            label: slotLabel,
            time: String(slot.time || '').trim(),
            players: uniquePlayers.map((entry) => entry.name),
            pairKeys,
            repeatPairs: [],
          };
        });
        return {
          roundIndex,
          title: roundLabel,
          course: String(round.course || '').trim() || 'Course TBD',
          date: toIsoDate(round.date),
          format: String((ryderRound && ryderRound.format) || '').trim(),
          slots: slotSummaries,
        };
      }).filter((round) => round.slots.length);
      const playerPool = Array.from(playersByKey.entries())
        .map(([key, name]) => ({ key, name }))
        .sort((left, right) => left.name.localeCompare(right.name));
      const allPairs = [];
      for (let leftIndex = 0; leftIndex < playerPool.length; leftIndex += 1) {
        for (let rightIndex = leftIndex + 1; rightIndex < playerPool.length; rightIndex += 1) {
          const leftPlayer = playerPool[leftIndex];
          const rightPlayer = playerPool[rightIndex];
          const pairKey = `${leftPlayer.key}::${rightPlayer.key}`;
          const existing = pairOccurrences.get(pairKey);
          allPairs.push({
            key: pairKey,
            players: [leftPlayer.name, rightPlayer.name],
            locations: existing ? existing.locations.slice() : [],
            count: existing ? existing.locations.length : 0,
          });
        }
      }
      const repeatedPairs = Array.from(pairOccurrences.values())
        .filter((entry) => entry.locations.length > 1)
        .map((entry) => ({ ...entry, count: entry.locations.length }))
        .sort((left, right) => {
          if (right.count !== left.count) return right.count - left.count;
          return left.players.join(' / ').localeCompare(right.players.join(' / '));
        });
      const singlePairs = allPairs
        .filter((entry) => entry.count === 1)
        .sort((left, right) => left.players.join(' / ').localeCompare(right.players.join(' / ')));
      const neverPairs = allPairs
        .filter((entry) => entry.count === 0)
        .sort((left, right) => left.players.join(' / ').localeCompare(right.players.join(' / ')));
      const repeatedByKey = new Map(repeatedPairs.map((entry) => [entry.key, entry]));
      roundSummaries.forEach((round) => {
        round.slots.forEach((slot) => {
          slot.repeatPairs = slot.pairKeys
            .map((pairKey) => repeatedByKey.get(pairKey))
            .filter(Boolean)
            .sort((left, right) => {
              if (right.count !== left.count) return right.count - left.count;
              return left.players.join(' / ').localeCompare(right.players.join(' / '));
            });
        });
      });
      return {
        rounds: roundSummaries,
        playerCount: playerPool.length,
        totalPairs: allPairs.length,
        repeatedPairs,
        singlePairs,
        neverPairs,
        totalSlots: roundSummaries.reduce((sum, round) => sum + round.slots.length, 0),
        maxRepeatCount: repeatedPairs.length ? repeatedPairs[0].count : 0,
      };
    }
    function renderTripFoursomeSummary(rounds = []) {
      const summary = buildTripFoursomeSummary(rounds);
      const usingDefaults = !(Array.isArray(trip && trip.rounds) && trip.rounds.length);
      const sourceNote = loadError
        ? `Trip load failed. Showing the current seeded Myrtle defaults instead. ${loadError}`
        : (usingDefaults ? 'Showing the current seeded Myrtle defaults because the saved trip does not have rounds yet.' : 'Showing the current saved Myrtle tee sheet.');
      const renderPairBucket = (title, entries = [], emptyText = '', options = {}) => `
        <details class="competition-section"${options.open ? ' open' : ''}>
          <summary>
            <span>${escapeHtml(title)}</span>
            <span class="competition-note">${escapeHtml(entries.length ? `${entries.length} pair${entries.length === 1 ? '' : 's'}` : emptyText)}</span>
          </summary>
          <div class="competition-section-body">
            ${entries.length ? `
              <div class="all-foursomes-repeat-grid">
                ${entries.map((entry) => `
                  <div class="all-foursomes-repeat-card${options.markHeavy && entry.count >= 3 ? ' is-heavy' : ''}">
                    <div class="all-foursomes-round-head">
                      <strong>${escapeHtml(entry.players.join(' / '))}</strong>
                      <span class="competition-pill">${escapeHtml(`${entry.count}x together`)}</span>
                    </div>
                    ${entry.locations.length
                      ? `<ol class="all-foursomes-repeat-list">${entry.locations.map((location) => `<li>${escapeHtml(location)}</li>`).join('')}</ol>`
                      : `<div class="competition-note">${escapeHtml(options.entryEmptyText || emptyText)}</div>`}
                  </div>
                `).join('')}
              </div>
            ` : `<div class="competition-note">${escapeHtml(emptyText)}</div>`}
          </div>
        </details>
      `;
      return `
        <div class="all-foursomes-section">
          <div class="page-section-head">
            <div class="page-section-copy">
              <h2 style="margin:0;font-size:1.08rem;">All Foursomes</h2>
              <div class="competition-note">Week view of every tee group, top to bottom, plus pair buckets for golfers who played together more than once, exactly once, or never.</div>
              <div class="competition-note">${escapeHtml(sourceNote)}</div>
            </div>
            <div class="page-section-actions">
              <a class="hero-link" data-trip-page-link href="${quoteAttr(getTripPageHref())}">Back to Myrtle Trip</a>
              <a class="hero-link" data-leaderboard-link href="${quoteAttr(getLeaderboardPageHref())}">Ryder Cup Standings</a>
              <a class="hero-link" data-report-link href="${quoteAttr(getPrizeReportPageHref())}">Prize Report</a>
            </div>
          </div>
          ${summary.rounds.length ? `
            <div class="competition-pill-row">
              <span class="competition-pill">${escapeHtml(String(summary.playerCount))} golfers</span>
              <span class="competition-pill">${escapeHtml(String(summary.rounds.length))} rounds</span>
              <span class="competition-pill">${escapeHtml(String(summary.totalSlots))} foursomes</span>
              <span class="competition-pill">${escapeHtml(String(summary.totalPairs))} pairings checked</span>
              <span class="competition-pill">${escapeHtml(String(summary.repeatedPairs.length))} repeated</span>
              <span class="competition-pill">${escapeHtml(String(summary.singlePairs.length))} once</span>
              <span class="competition-pill">${escapeHtml(String(summary.neverPairs.length))} never</span>
              ${summary.maxRepeatCount > 1 ? `<span class="competition-pill">Highest repeat ${escapeHtml(String(summary.maxRepeatCount))}x</span>` : ''}
            </div>
          ` : '<div class="competition-empty">No Myrtle rounds are available yet.</div>'}
          ${renderPairBucket('Together More Than Once', summary.repeatedPairs, 'No player pairs repeat across the current tee sheet.', { open: true, markHeavy: true })}
          ${renderPairBucket('Together Once', summary.singlePairs, 'No one is only together once.')}
          ${renderPairBucket('Never Together', summary.neverPairs, 'Everybody has shared a foursome at least once.', { entryEmptyText: 'Never together in the current tee sheet.' })}
          <div class="all-foursomes-round-grid">
            ${summary.rounds.map((round) => `
              <div class="all-foursomes-round-card">
                <div class="all-foursomes-round-head">
                  <div class="page-section-copy">
                    <strong>${escapeHtml(round.title)}</strong>
                    <span class="competition-note">${escapeHtml([round.course, round.date ? formatDateLong(round.date) : '', round.format].filter(Boolean).join(' · '))}</span>
                  </div>
                  <span class="competition-pill">${escapeHtml(String(round.slots.length))} tee times</span>
                </div>
                <div class="all-foursomes-slot-list">
                  ${round.slots.map((slot) => `
                    <div class="all-foursomes-slot-card">
                      <div class="all-foursomes-slot-head">
                        <strong>${escapeHtml(slot.label)}</strong>
                        <span class="competition-note">${escapeHtml(formatTime12(slot.time) || 'Time TBD')}</span>
                      </div>
                      <div class="competition-pill-row">
                        ${slot.players.map((player) => `<span class="competition-pill">${escapeHtml(player)}</span>`).join('') || '<span class="competition-empty">No golfers in this tee time yet.</span>'}
                      </div>
                      ${slot.repeatPairs.length ? `
                        <div class="all-foursomes-repeat-pill-row">
                          ${slot.repeatPairs.map((entry) => `
                            <span class="all-foursomes-repeat-pill${entry.count >= 3 ? ' is-heavy' : ''}">
                              <strong>${escapeHtml(`${entry.count}x`)}</strong>
                              <span>${escapeHtml(entry.players.join(' / '))}</span>
                            </span>
                          `).join('')}
                        </div>
                      ` : '<div class="competition-note">No repeated pairs inside this foursome.</div>'}
                    </div>
                  `).join('')}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }
    function renderPage() {
      syncTripLinks();
      document.getElementById('allFoursomesBox').innerHTML = renderTripFoursomeSummary(getTripRounds());
      syncTripLinks();
    }
    async function loadPage() {
      loadError = '';
      try {
        const trips = await tripFetchJson(tripApi('/api/trips'));
        trip = findPreferredMyrtleTrip(trips);
        if (trip) {
          tripId = trip._id;
          competitionData = await tripFetchJson(tripApi(`/api/trips/${tripId}/competition`)).catch(() => null);
        }
      } catch (error) {
        loadError = error && error.message ? error.message : 'Trip load failed.';
      }
      renderPage();
    }
    loadPage();
  </script>
</body>
