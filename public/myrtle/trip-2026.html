    async function saveRyderCupSettings() {
      const payload = collectRyderCupSettingsPayload();
      await tripAdminPut(`/api/trips/${tripId}/competition/ryder-cup/settings`, payload);
      await loadTrip();
    }

    const sameRyderPlayer = (left, right) => Boolean(
      left && right &&
      left.playerName === right.playerName &&
      left.teamId === right.teamId
    );
    const readRyderCupTeamPlayer = (element) => {
      if (!element) return null;
      const playerName = String(element.dataset.ryderPlayerName || '').trim();
      const teamId = String(element.dataset.ryderTeamId || '').trim();
      const dropKey = String(element.dataset.ryderDropKey || '').trim();
      if (!playerName || !teamId || !dropKey) return null;
      return { playerName, teamId, dropKey };
    };
    const readRyderCupTeamCard = (element) => {
      const card = element && element.closest ? element.closest('[data-ryder-team-card]') : null;
      if (!card) return null;
      const teamId = String(card.dataset.ryderTeamId || '').trim();
      const teamName = String(card.dataset.ryderTeamName || '').trim();
      if (!teamId) return null;
      return { teamId, teamName };
    };
    const findRyderCupTeamPlayerChip = (predicate) => {
      const chips = Array.from(document.querySelectorAll('.ryder-player-chip[data-ryder-player-name]'));
      return chips.find(predicate) || null;
    };
    const findRyderCupTeamCard = (predicate) => {
      const cards = Array.from(document.querySelectorAll('.ryder-team-card[data-ryder-team-id]'));
      return cards.find(predicate) || null;
    };
    const getRyderCupTeamById = (teamId = '') => {
      const targetId = String(teamId || '').trim();
      if (!targetId) return null;
      const teams = Array.isArray(getRyderCupData()?.teams) ? getRyderCupData().teams : [];
      return teams.find((team) => String((team && team.id) || '').trim() === targetId) || null;
    };
    function promptForRyderCupSwapTarget(sourcePlayer = null, targetTeamId = '') {
      const sourceName = String((sourcePlayer && sourcePlayer.playerName) || '').trim();
      const sourceTeamId = String((sourcePlayer && sourcePlayer.teamId) || '').trim();
      const team = getRyderCupTeamById(targetTeamId);
      if (!sourceName || !team) return null;
      const teamId = String(team.id || '').trim();
      if (!teamId || teamId === sourceTeamId) return null;
      const candidates = (team.players || []).map((player) => ({
        name: String((player && player.name) || '').trim(),
        rank: String((player && player.rank) || '').trim()
      })).filter((player) => player.name);
      if (!candidates.length) return null;
      const promptLines = [
        `Swap ${sourceName} with who on ${team.name || 'that team'}?`,
        '',
        ...candidates.map((player, index) => `${index + 1}. ${player.name}${player.rank ? ` (#${player.rank})` : ''}`),
        '',
        'Enter the number or player name.'
      ];
      while (true) {
        const answer = window.prompt(promptLines.join('\n'), '1');
        if (answer === null) return null;
        const value = String(answer || '').trim();
        if (!value) return null;
        const optionIndex = Number(value);
        if (Number.isInteger(optionIndex) && optionIndex >= 1 && optionIndex <= candidates.length) {
          return candidates[optionIndex - 1].name;
        }
        const normalizedValue = normalizeNameKey(value);
        const matchedPlayer = candidates.find((player) => normalizeNameKey(player.name) === normalizedValue);
        if (matchedPlayer) return matchedPlayer.name;
        alert(`Enter 1-${candidates.length} or one of these names: ${candidates.map((player) => player.name).join(', ')}`);
      }
    }
    function applyRyderCupTeamState() {
      document.querySelectorAll('.ryder-team-card.is-drop-target').forEach((node) => node.classList.remove('is-drop-target'));
      document.querySelectorAll('.ryder-player-chip.is-selected').forEach((node) => node.classList.remove('is-selected'));
      document.querySelectorAll('.ryder-player-chip.is-dragging').forEach((node) => node.classList.remove('is-dragging'));
      document.querySelectorAll('.ryder-player-chip.is-drop-target').forEach((node) => node.classList.remove('is-drop-target'));

      if (competitionUiState.selectedRyderPlayer) {
        const selectedChip = findRyderCupTeamPlayerChip((node) =>
          sameRyderPlayer(readRyderCupTeamPlayer(node), competitionUiState.selectedRyderPlayer)
        );
        if (selectedChip) selectedChip.classList.add('is-selected');
      }
      if (competitionUiState.draggedRyderPlayer) {
        const draggedChip = findRyderCupTeamPlayerChip((node) =>
          sameRyderPlayer(readRyderCupTeamPlayer(node), competitionUiState.draggedRyderPlayer)
        );
        if (draggedChip) draggedChip.classList.add('is-dragging');
      }
      if (competitionUiState.activeRyderDropTeamId) {
        const dropTargetCard = findRyderCupTeamCard((node) =>
          String(node.dataset.ryderTeamId || '').trim() === competitionUiState.activeRyderDropTeamId
        );
        if (dropTargetCard) dropTargetCard.classList.add('is-drop-target');
      }
      if (competitionUiState.activeRyderDropKey) {
        const dropTargetChip = findRyderCupTeamPlayerChip((node) =>
          String(node.dataset.ryderDropKey || '').trim() === competitionUiState.activeRyderDropKey
        );
        if (dropTargetChip) dropTargetChip.classList.add('is-drop-target');
      }
    }
    function clearRyderCupTeamDragState() {
      stopDragAutoScroll();
      competitionUiState.selectedRyderPlayer = null;
      competitionUiState.draggedRyderPlayer = null;
      competitionUiState.activeRyderDropKey = '';
      competitionUiState.activeRyderDropTeamId = '';
      applyRyderCupTeamState();
    }

    async function saveRyderCupTeamSwap(playerName, targetPlayerName) {
      const ryderCup = getRyderCupData();
      if (!ryderCup || !ryderCup.canEditTeams) {
        throw new Error('Ryder Cup teams are locked after results are entered.');
      }
      const sourceName = String(playerName || '').trim();
      const targetName = String(targetPlayerName || '').trim();
      if (!sourceName || !targetName || sourceName === targetName) return;
      await tripAdminPut(`/api/trips/${tripId}/competition/ryder-cup/teams/swap`, {
        playerName: sourceName,
        targetPlayerName: targetName,
      });
      await loadTrip();
    }

    const itineraryBox = document.getElementById('itineraryBox');
    if (itineraryBox) {
      itineraryBox.addEventListener('click', async function (event) {
        const dateChip = event.target.closest('[data-trip-date-select]');
        if (dateChip) {
          event.preventDefault();
          const nextDate = String(dateChip.dataset.tripDateSelect || '').trim();
        if (!nextDate || nextDate === toIsoDate(tripScheduleState.selectedDate)) return;
          tripScheduleState.selectedDate = nextDate;
          renderTripSchedule(getTripRounds());
          return;
        }

        const slotShiftButton = event.target.closest('[data-trip-slot-shift]');
        if (slotShiftButton) {
          event.preventDefault();
          if (tripTeeSheetState.isSaving || slotShiftButton.disabled) return;
          const roundIndex = Number.parseInt(slotShiftButton.dataset.roundIndex, 10);
          const slotIndex = Number.parseInt(slotShiftButton.dataset.slotIndex, 10);
          const delta = Number.parseInt(slotShiftButton.dataset.tripSlotShift, 10);
          if (!isValidTripIndex(roundIndex) || !isValidTripIndex(slotIndex) || !Number.isInteger(delta) || !delta) return;
          await persistTripFoursomeShift(roundIndex, slotIndex, delta);
          return;
        }

        const slotDragHandle = event.target.closest('[data-trip-slot-drag]');
        if (slotDragHandle) {
          event.preventDefault();
          return;
        }

        const chip = event.target.closest('.trip-player-chip[data-trip-player]');
        if (chip) {
          event.preventDefault();
          if (tripTeeSheetState.isSaving) return;
          const source = readTripPlayerPosition(chip);
          if (!source) return;
          tripTeeSheetState.selectedPlayer = sameTripPlayer(tripTeeSheetState.selectedPlayer, source) ? null : source;
          tripTeeSheetState.activeDropTarget = null;
          tripTeeSheetState.activeSlotDropTarget = null;
          applyTripTeeSheetState();
          return;
        }

        const targetEl = event.target.closest('.trip-drop-target[data-trip-target]');
        if (!targetEl || !tripTeeSheetState.selectedPlayer || tripTeeSheetState.isSaving) return;
        const target = readTripTargetPosition(targetEl);
        if (!target) return;
        await persistTripTeeMove(tripTeeSheetState.selectedPlayer, target);
      });

      itineraryBox.addEventListener('dragstart', function (event) {
        const slotHandle = event.target.closest('[data-trip-slot-drag]');
        if (slotHandle) {
          if (tripTeeSheetState.isSaving) return;
          const source = readTripSlotPosition(slotHandle);
          if (!source) return;
          tripTeeSheetState.draggedSlot = source;
          tripTeeSheetState.draggedPlayer = null;
          tripTeeSheetState.selectedPlayer = null;
          tripTeeSheetState.activeDropTarget = null;
          tripTeeSheetState.activeSlotDropTarget = null;
          applyTripTeeSheetState();
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', makeTripTargetKey(source));
          }
          return;
        }
        const chip = event.target.closest('.trip-player-chip[data-trip-player]');
        if (!chip || tripTeeSheetState.isSaving) return;
        const source = readTripPlayerPosition(chip);
        if (!source) return;
        tripTeeSheetState.draggedPlayer = source;
        tripTeeSheetState.draggedSlot = null;
        tripTeeSheetState.selectedPlayer = null;
        tripTeeSheetState.activeDropTarget = null;
        tripTeeSheetState.activeSlotDropTarget = null;
        applyTripTeeSheetState();
        if (event.dataTransfer) {
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', makeTripPlayerKey(source));
        }
      });

      itineraryBox.addEventListener('dragover', function (event) {
        if (tripTeeSheetState.draggedSlot && !tripTeeSheetState.isSaving) {
          const targetEl = event.target.closest('.trip-slot[data-trip-target][data-container-type="slot"]');
          if (!targetEl) return;
          const target = readTripSlotPosition(targetEl);
          if (!target || sameTripSlot(tripTeeSheetState.draggedSlot, target) || target.roundIndex !== tripTeeSheetState.draggedSlot.roundIndex) return;
          event.preventDefault();
          if (!tripTeeSheetState.activeSlotDropTarget || !sameTripSlot(tripTeeSheetState.activeSlotDropTarget, target)) {
            tripTeeSheetState.activeSlotDropTarget = target;
            applyTripTeeSheetState();
          }
          return;
        }
        if (!tripTeeSheetState.draggedPlayer || tripTeeSheetState.isSaving) return;
        const targetEl = event.target.closest('.trip-drop-target[data-trip-target]');
        if (!targetEl) return;
        const target = readTripTargetPosition(targetEl);
        if (!target || sameTripTarget(tripTeeSheetState.draggedPlayer, target)) return;
        event.preventDefault();
        if (!tripTeeSheetState.activeDropTarget || !sameTripTarget(tripTeeSheetState.activeDropTarget, target)) {
          tripTeeSheetState.activeDropTarget = target;
          applyTripTeeSheetState();
        }
      });

      itineraryBox.addEventListener('dragleave', function (event) {
        const slotTargetEl = event.target.closest('.trip-slot[data-trip-target][data-container-type="slot"]');
        if (slotTargetEl && tripTeeSheetState.activeSlotDropTarget) {
          const related = event.relatedTarget && event.relatedTarget.closest ? event.relatedTarget.closest('.trip-slot[data-trip-target][data-container-type="slot"]') : null;
          if (related !== slotTargetEl) {
            const target = readTripSlotPosition(slotTargetEl);
            if (sameTripSlot(target, tripTeeSheetState.activeSlotDropTarget)) {
              tripTeeSheetState.activeSlotDropTarget = null;
              applyTripTeeSheetState();
            }
          }
          return;
        }
        const targetEl = event.target.closest('.trip-drop-target[data-trip-target]');
        if (!targetEl || !tripTeeSheetState.activeDropTarget) return;
        const related = event.relatedTarget && event.relatedTarget.closest ? event.relatedTarget.closest('.trip-drop-target[data-trip-target]') : null;
        if (related === targetEl) return;
        const target = readTripTargetPosition(targetEl);
        if (sameTripTarget(target, tripTeeSheetState.activeDropTarget)) {
          tripTeeSheetState.activeDropTarget = null;
          applyTripTeeSheetState();
        }
      });

      itineraryBox.addEventListener('drop', async function (event) {
        if (tripTeeSheetState.draggedSlot && !tripTeeSheetState.isSaving) {
          const targetEl = event.target.closest('.trip-slot[data-trip-target][data-container-type="slot"]');
          if (!targetEl) return;
          event.preventDefault();
          const target = readTripSlotPosition(targetEl);
          if (!target || sameTripSlot(tripTeeSheetState.draggedSlot, target) || target.roundIndex !== tripTeeSheetState.draggedSlot.roundIndex) {
            clearTripPointerState();
            return;
          }
          await persistTripFoursomeSwap(tripTeeSheetState.draggedSlot, target);
          return;
        }
        if (!tripTeeSheetState.draggedPlayer || tripTeeSheetState.isSaving) return;
        const targetEl = event.target.closest('.trip-drop-target[data-trip-target]');
        if (!targetEl) return;
        event.preventDefault();
        const target = readTripTargetPosition(targetEl);
        if (!target) {
          clearTripPointerState();
          return;
        }
        await persistTripTeeMove(tripTeeSheetState.draggedPlayer, target);
      });

      itineraryBox.addEventListener('dragend', function () {
        clearTripPointerState();
      });
    }

    document.addEventListener('dragover', function (event) {
      if (!tripTeeSheetState.draggedPlayer && !tripTeeSheetState.draggedSlot && !competitionUiState.draggedRyderPlayer && !tripRyderCupUiState.draggedPlayerSeed) return;
      updateDragAutoScroll(event.clientX, event.clientY);
    });

    document.addEventListener('drop', function () {
      stopDragAutoScroll();
    });

    document.addEventListener('keydown', function (event) {
      if (event.key !== 'Escape') return;
      if (tripTeeSheetState.selectedPlayer || tripTeeSheetState.draggedPlayer || tripTeeSheetState.draggedSlot || tripTeeSheetState.activeDropTarget || tripTeeSheetState.activeSlotDropTarget) {
        clearTripPointerState();
      }
      if (competitionUiState.selectedRyderPlayer || competitionUiState.draggedRyderPlayer || competitionUiState.activeRyderDropKey || competitionUiState.activeRyderDropTeamId) {
        clearRyderCupTeamDragState();
      }
      if (tripRyderCupUiState.draggedPlayerSeed || tripRyderCupUiState.activeDropTeamKey) {
        clearTripRyderCupOverlayDragState();

    const competitionBox = document.getElementById('competitionBox');
    if (competitionBox) {
      competitionBox.addEventListener('dragstart', function (event) {
        const tripRyderHandle = event.target.closest('[data-trip-ryder-drag-seed]');
        if (tripRyderHandle) {
          if (!tripRyderCupUiState.isEditing || !tripRyderCupUiState.draft) return;
          const seed = String(tripRyderHandle.dataset.tripRyderDragSeed || '').trim();
          const sourceTeamKey = getTripRyderCupDraftTeamKey(seed);
          if (!seed || !sourceTeamKey) return;
          tripRyderCupUiState.draggedPlayerSeed = seed;
          tripRyderCupUiState.activeDropTeamKey = '';
          applyTripRyderCupOverlayState();
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', seed);
          }
          return;
        }
        const ryderPlayerChip = event.target.closest('[data-ryder-player-name]');
        if (ryderPlayerChip) {
          const ryderCup = getRyderCupData();
          if (!ryderCup || !ryderCup.canEditTeams) return;
          const selectedPlayer = readRyderCupTeamPlayer(ryderPlayerChip);
          if (!selectedPlayer) return;
          competitionUiState.selectedRyderPlayer = null;
          competitionUiState.draggedRyderPlayer = selectedPlayer;
          competitionUiState.activeRyderDropKey = '';
          competitionUiState.activeRyderDropTeamId = '';
          applyRyderCupTeamState();
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', selectedPlayer.playerName);
          }
          return;
        }
      });

      competitionBox.addEventListener('dragover', function (event) {
        if (tripRyderCupUiState.draggedPlayerSeed) {
          const targetTeamCard = event.target.closest('[data-trip-ryder-team]');
          if (!targetTeamCard) return;
          const targetTeamKey = String(targetTeamCard.dataset.tripRyderTeam || '').trim();
          const sourceTeamKey = getTripRyderCupDraftTeamKey(tripRyderCupUiState.draggedPlayerSeed);
          if (!targetTeamKey || !sourceTeamKey || targetTeamKey === sourceTeamKey) return;
          event.preventDefault();
          if (tripRyderCupUiState.activeDropTeamKey !== targetTeamKey) {
            tripRyderCupUiState.activeDropTeamKey = targetTeamKey;
            applyTripRyderCupOverlayState();
          }
          return;
        }
        if (competitionUiState.draggedRyderPlayer) {
          const targetPlayer = event.target.closest('[data-ryder-player-name]');
          if (targetPlayer) {
            const targetData = readRyderCupTeamPlayer(targetPlayer);
            if (!targetData) return;
            const { teamId: targetTeamId, dropKey: targetKey } = targetData;
            if (targetTeamId === competitionUiState.draggedRyderPlayer.teamId || targetKey === competitionUiState.draggedRyderPlayer.dropKey) return;
            event.preventDefault();
            if (competitionUiState.activeRyderDropKey !== targetKey || competitionUiState.activeRyderDropTeamId !== targetTeamId) {
              competitionUiState.activeRyderDropKey = targetKey;
              competitionUiState.activeRyderDropTeamId = targetTeamId;
              applyRyderCupTeamState();
            }
            return;
          }
          const targetTeamCard = readRyderCupTeamCard(event.target);
          if (!targetTeamCard || targetTeamCard.teamId === competitionUiState.draggedRyderPlayer.teamId) return;
          event.preventDefault();
          if (competitionUiState.activeRyderDropTeamId !== targetTeamCard.teamId || competitionUiState.activeRyderDropKey) {
            competitionUiState.activeRyderDropKey = '';
            competitionUiState.activeRyderDropTeamId = targetTeamCard.teamId;
            applyRyderCupTeamState();
          }
          return;
        }
      });

      competitionBox.addEventListener('dragleave', function (event) {
        const tripRyderTeamCard = event.target.closest('[data-trip-ryder-team]');
        if (tripRyderTeamCard && tripRyderCupUiState.activeDropTeamKey) {
          const relatedTeamCard = event.relatedTarget && event.relatedTarget.closest
            ? event.relatedTarget.closest('[data-trip-ryder-team]')
            : null;
          if (relatedTeamCard === tripRyderTeamCard) return;
          if (tripRyderCupUiState.activeDropTeamKey === String(tripRyderTeamCard.dataset.tripRyderTeam || '').trim()) {
            tripRyderCupUiState.activeDropTeamKey = '';
            applyTripRyderCupOverlayState();
          }
          return;
        }
        const targetPlayer = event.target.closest('[data-ryder-player-name]');
        if (targetPlayer) {
          const relatedTarget = event.relatedTarget && event.relatedTarget.closest
            ? event.relatedTarget.closest('[data-ryder-player-name]')
            : null;
          if (relatedTarget === targetPlayer) return;
          const targetTeamCard = targetPlayer.closest('[data-ryder-team-card]');
          const relatedTeamCard = event.relatedTarget && event.relatedTarget.closest
            ? event.relatedTarget.closest('[data-ryder-team-card]')
            : null;
          if (relatedTeamCard === targetTeamCard) return;
          if (competitionUiState.activeRyderDropKey === String(targetPlayer.dataset.ryderDropKey || '')) {
            competitionUiState.activeRyderDropKey = '';
            competitionUiState.activeRyderDropTeamId = '';
            applyRyderCupTeamState();
          }
          return;
        }
        const targetTeamCard = event.target.closest('[data-ryder-team-card]');
        if (!targetTeamCard) return;
        const targetTeam = readRyderCupTeamCard(targetTeamCard);
        if (!targetTeam) return;
        const relatedTeamCard = event.relatedTarget && event.relatedTarget.closest
          ? event.relatedTarget.closest('[data-ryder-team-card]')
          : null;
        if (relatedTeamCard === targetTeamCard) return;
        if (competitionUiState.activeRyderDropTeamId === targetTeam.teamId) {
          competitionUiState.activeRyderDropKey = '';
          competitionUiState.activeRyderDropTeamId = '';
          applyRyderCupTeamState();
        }
      });

      competitionBox.addEventListener('drop', async function (event) {
        if (tripRyderCupUiState.draggedPlayerSeed) {
          const targetTeamCard = event.target.closest('[data-trip-ryder-team]');
          event.preventDefault();
          const draggedSeed = tripRyderCupUiState.draggedPlayerSeed;
          const targetTeamKey = targetTeamCard ? String(targetTeamCard.dataset.tripRyderTeam || '').trim() : '';
          const sourceTeamKey = getTripRyderCupDraftTeamKey(draggedSeed);
          clearTripRyderCupOverlayDragState();
          if (!targetTeamKey || !sourceTeamKey || targetTeamKey === sourceTeamKey) return;
          moveTripRyderCupDraftPlayer(draggedSeed, targetTeamKey);
          renderCompetition();
          return;
        }
        if (competitionUiState.draggedRyderPlayer) {
          const targetPlayer = event.target.closest('[data-ryder-player-name]');
          const dragged = competitionUiState.draggedRyderPlayer;
          if (targetPlayer) {
            event.preventDefault();
            const targetData = readRyderCupTeamPlayer(targetPlayer);
            if (!targetData) {
              clearRyderCupTeamDragState();
              return;
            }
            const { playerName: targetName, teamId: targetTeamId } = targetData;
            clearRyderCupTeamDragState();
            if (!targetName || !targetTeamId || targetTeamId === dragged.teamId) return;
            try {
              await saveRyderCupTeamSwap(dragged.playerName, targetName);
            } catch (error) {
              console.error(error);
              alert(`Competition save failed: ${error.message || 'Unknown error'}`);
            }
            return;
          }
          const targetTeamCard = readRyderCupTeamCard(event.target);
          if (!targetTeamCard) return;
          event.preventDefault();
          clearRyderCupTeamDragState();
          if (!targetTeamCard.teamId || targetTeamCard.teamId === dragged.teamId) return;
          const targetName = promptForRyderCupSwapTarget(dragged, targetTeamCard.teamId);
          if (!targetName) return;
          try {
            await saveRyderCupTeamSwap(dragged.playerName, targetName);
          } catch (error) {
            console.error(error);
            alert(`Competition save failed: ${error.message || 'Unknown error'}`);
          }
          return;
        }
      });

      competitionBox.addEventListener('dragend', function () {
        clearTripRyderCupOverlayDragState();
        clearRyderCupTeamDragState();
      });

      competitionBox.addEventListener('input', function (event) {
        const ryderScoreInput = event.target.closest('[data-ryder-player-score]');
        if (ryderScoreInput) {
          const roundContainer = ryderScoreInput.closest('[data-ryder-round-index]');
          if (roundContainer) syncRyderCupRoundEditor(Number(roundContainer.dataset.ryderRoundIndex));
          return;
        }
        if (!tripRyderCupUiState.isEditing || !tripRyderCupUiState.draft) return;
        const teamNameField = event.target.closest('[data-trip-ryder-team-name]');
        if (teamNameField) {
          updateTripRyderCupDraftField(String(teamNameField.dataset.tripRyderTeamName || '').trim(), teamNameField.value);
          return;
        }
        const handicapField = event.target.closest('[data-trip-ryder-player-handicap]');
        if (handicapField) {
          updateTripRyderCupDraftPlayerField(String(handicapField.dataset.tripRyderPlayerHandicap || '').trim(), 'handicapIndex', handicapField.value);
          return;
        }
        const notesField = event.target.closest('[data-trip-ryder-notes]');
        if (notesField) {
          updateTripRyderCupDraftField('notes', notesField.value);
        }
      });

      competitionBox.addEventListener('change', function (event) {
        const ryderTeamPlayerSelect = event.target.closest('[data-ryder-team-player]');
        if (ryderTeamPlayerSelect) {
          const roundContainer = ryderTeamPlayerSelect.closest('[data-ryder-round-index]');
          if (roundContainer) syncRyderCupRoundEditor(Number(roundContainer.dataset.ryderRoundIndex));
          return;
        }
        const enabledToggle = event.target.closest('[data-trip-ryder-enabled]');
        if (enabledToggle) {
          updateTripRyderCupDraftField('enabled', enabledToggle.checked);
          renderCompetition();
          return;
        }
        const handicapField = event.target.closest('[data-trip-ryder-player-handicap]');
        if (handicapField) {
          updateTripRyderCupDraftPlayerField(String(handicapField.dataset.tripRyderPlayerHandicap || '').trim(), 'handicapIndex', handicapField.value);
          renderCompetition();
          return;
        }
        const teamSelect = event.target.closest('[data-trip-ryder-player-seed]');
        if (teamSelect) {
          moveTripRyderCupDraftPlayer(teamSelect.dataset.tripRyderPlayerSeed, teamSelect.value);
          renderCompetition();
          return;
        }
        if (event.target.id === 'competitionScoreRoundSelect') {
          competitionUiState.scoreRoundIndex = Number(event.target.value) || 0;
          competitionUiState.scorePlayerName = '';
          renderCompetition();
          return;
        }
        if (event.target.id === 'competitionScorePlayerSelect') {
          competitionUiState.scorePlayerName = event.target.value;
          renderCompetition();
        }
      });

      competitionBox.addEventListener('click', async function (event) {
        const ryderPlayerChip = event.target.closest('[data-ryder-player-name]');
        const ryderTeamCard = !ryderPlayerChip ? readRyderCupTeamCard(event.target) : null;
        const tripRyderCopyButton = event.target.closest('[data-trip-ryder-copy]');
        const tripRyderEditButton = event.target.closest('[data-trip-ryder-edit]');
        const tripRyderCancelButton = event.target.closest('[data-trip-ryder-cancel]');
        const tripRyderSaveButton = event.target.closest('[data-trip-ryder-save]');
        const modeButton = event.target.closest('[data-save-competition-mode]');
        const handicapButton = event.target.closest('[data-save-handicaps]');
        const scoreButton = event.target.closest('[data-save-round-scores]');
        const matchButton = event.target.closest('[data-save-match-teams]');
        const sideGamesButton = event.target.closest('[data-save-side-games]');
        const ryderRoundButton = event.target.closest('[data-save-ryder-round]');
        const ryderSettingsButton = event.target.closest('[data-save-ryder-settings]');

        try {
          if (tripRyderCopyButton) {
            await copyTripRyderCupRoster(String(tripRyderCopyButton.dataset.tripRyderCopy || '').trim());
            return;
          }
          if (tripRyderEditButton) {
            startTripRyderCupEdit();
            renderCompetition();
            return;
          }
          if (tripRyderCancelButton) {
            cancelTripRyderCupEdit();
            renderCompetition();
            return;
          }
          if (tripRyderSaveButton) {
            await saveTripRyderCupOverlay();
            return;
          }
          if (ryderPlayerChip) {
            const ryderCup = getRyderCupData();
            if (!ryderCup || !ryderCup.canEditTeams) return;
            const targetPlayer = readRyderCupTeamPlayer(ryderPlayerChip);
            if (!targetPlayer) return;
            if (sameRyderPlayer(competitionUiState.selectedRyderPlayer, targetPlayer)) {
              clearRyderCupTeamDragState();
              return;
            }
            if (!competitionUiState.selectedRyderPlayer || competitionUiState.selectedRyderPlayer.teamId === targetPlayer.teamId) {
              competitionUiState.selectedRyderPlayer = targetPlayer;
              competitionUiState.draggedRyderPlayer = null;
              competitionUiState.activeRyderDropKey = '';
              competitionUiState.activeRyderDropTeamId = '';
              applyRyderCupTeamState();
              return;
            }
            const sourcePlayer = competitionUiState.selectedRyderPlayer;
            clearRyderCupTeamDragState();
            await saveRyderCupTeamSwap(sourcePlayer.playerName, targetPlayer.playerName);
            return;
          }
          if (ryderTeamCard && competitionUiState.selectedRyderPlayer) {
            const sourcePlayer = competitionUiState.selectedRyderPlayer;
            if (!sourcePlayer || ryderTeamCard.teamId === sourcePlayer.teamId) return;
            const targetName = promptForRyderCupSwapTarget(sourcePlayer, ryderTeamCard.teamId);
            clearRyderCupTeamDragState();
            if (!targetName) return;
            await saveRyderCupTeamSwap(sourcePlayer.playerName, targetName);
            return;
          }
          if (modeButton) {
            await saveCompetitionMode();
            return;
          }
          if (handicapButton) {
            await saveCompetitionHandicaps();
            return;
          }
          if (scoreButton) {
            await saveCompetitionScores(Number(scoreButton.dataset.saveRoundScores));
            return;
          }
          if (matchButton) {
            const [roundIndex, slotIndex] = String(matchButton.dataset.saveMatchTeams || '').split(':').map((value) => Number(value));
            await saveCompetitionMatchTeams(roundIndex, slotIndex, matchButton);
            return;
          }
          if (sideGamesButton) {
            await saveCompetitionSideGames(Number(sideGamesButton.dataset.saveSideGames));
            return;
          }
          if (ryderRoundButton) {
            await saveRyderCupRound(Number(ryderRoundButton.dataset.saveRyderRound));
            return;
          }
          if (ryderSettingsButton) {
            await saveRyderCupSettings();
          }
        } catch (error) {
          console.error(error);
          alert(`Competition save failed: ${error.message || 'Unknown error'}`);
        }
      });
    }

    window.addEventListener('DOMContentLoaded', loadTrip);
  </script>
</body>
</html>
